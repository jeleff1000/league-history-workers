name: 'Cleanup Staging'
description: 'Clean up staging tables (no-op on Fly.io — staging is local)'

inputs:
  database_name:
    description: 'Database name'
    required: true
  has_external_data:
    description: 'Whether external data was uploaded to staging'
    required: false
    default: 'false'

outputs:
  cleanup_success:
    description: 'Whether cleanup succeeded'
    value: ${{ steps.cleanup.outputs.cleanup_success }}
  tables_dropped:
    description: 'Number of staging tables dropped'
    value: ${{ steps.cleanup.outputs.tables_dropped }}

runs:
  using: 'composite'
  steps:
    - name: Cleanup staging data
      id: cleanup
      shell: bash
      env:
        DATABASE_NAME: ${{ inputs.database_name }}
        HAS_EXTERNAL_DATA: ${{ inputs.has_external_data }}
      run: |
        echo "========================================"
        echo "Staging cleanup (no-op on Fly.io)"
        echo "Database: ${DATABASE_NAME}"
        echo "========================================"
        echo "Staging tables are local on Fly.io — no remote cleanup needed."

        # Write outputs
        echo "cleanup_success=true" >> $GITHUB_OUTPUT
        echo "tables_dropped=0" >> $GITHUB_OUTPUT
