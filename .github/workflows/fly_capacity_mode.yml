name: DuckDB Capacity Mode

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Capacity mode to apply"
        required: true
        type: choice
        options:
          - normal
          - event
          - fleet
          - emergency
          - status
        default: status
      password:
        description: "Capacity mode password"
        required: true
        type: string
      duration_minutes:
        description: "Planned event length for cost estimate"
        required: false
        type: choice
        options:
          - "30"
          - "60"
          - "120"
          - "240"
        default: "60"
      ram_level:
        description: "RAM level for database machines"
        required: false
        type: choice
        options:
          - 4gb
          - 8gb
          - 16gb
        default: 4gb
      storage_level:
        description: "Volume size level; only extends upward"
        required: false
        type: choice
        options:
          - 50gb
          - 100gb
          - 200gb
        default: 50gb
      dry_run:
        description: "Print Fly commands without applying changes"
        required: false
        type: boolean
        default: false
      yahoo_oauth_ref:
        description: "yahoo_oauth branch/ref to check out"
        required: false
        type: string
        default: main

permissions:
  contents: read

concurrency:
  group: duckdb-capacity-mode
  cancel-in-progress: false

jobs:
  capacity-mode:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout yahoo_oauth
        uses: actions/checkout@v5
        with:
          repository: jeleff1000/yahoo_oauth
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ inputs.yahoo_oauth_ref || 'main' }}

      - name: Install flyctl
        run: |
          curl -sL https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> "$GITHUB_PATH"

      - name: Apply capacity mode
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_PRIMARY_MACHINE_ID: ${{ secrets.FLY_PRIMARY_MACHINE_ID }}
          FLY_REPLICA_MACHINE_IDS: ${{ secrets.FLY_REPLICA_MACHINE_IDS }}
          FLY_PRIMARY_VOLUME_ID: ${{ secrets.FLY_PRIMARY_VOLUME_ID }}
          FLY_REPLICA_VOLUME_IDS: ${{ secrets.FLY_REPLICA_VOLUME_IDS }}
          DATABASE_SERVER_URL: ${{ secrets.DATABASE_SERVER_URL }}
          DUCKDB_CAPACITY_MODE_PASSWORD: ${{ secrets.DUCKDB_CAPACITY_MODE_PASSWORD }}
          DUCKDB_CAPACITY_MODE_PASSWORD_INPUT: ${{ inputs.password }}
        run: |
          ARGS=(--mode "${{ inputs.mode }}")
          ARGS+=(--ram-level "${{ inputs.ram_level }}")
          ARGS+=(--storage-level "${{ inputs.storage_level }}")
          if [ -n "${{ inputs.duration_minutes }}" ]; then
            ARGS+=(--duration-minutes "${{ inputs.duration_minutes }}")
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          python scripts/fly_capacity_mode.py "${ARGS[@]}"
