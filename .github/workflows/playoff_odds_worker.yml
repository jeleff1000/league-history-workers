name: Playoff Odds & Expected Record Calculator

# Downloads league data from Fly.io to local DuckDB, runs all sims and
# aggregations locally, then uploads results back via Fly.io.

on:
  workflow_dispatch:
    inputs:
      database_name:
        description: 'Database name in ___leagues (e.g., demo_league)'
        required: true
        type: string
      n_sims:
        description: 'Number of Monte Carlo simulations (default: 10000)'
        required: false
        default: '10000'
        type: string
      user_id:
        description: 'User ID (for artifact naming)'
        required: false
        type: string
      yahoo_oauth_ref:
        description: 'yahoo_oauth branch/ref to check out (workers-repo override; default main)'
        required: false
        type: string
        default: 'main'

jobs:
  calculate-playoff-odds:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    concurrency:
      group: central-db-write-${{ github.event.inputs.database_name }}
      cancel-in-progress: false

    env:
      PYTHONUNBUFFERED: 1
      DATABASE_BACKEND: fly
      DATABASE_SERVER_URL: ${{ secrets.DATABASE_SERVER_URL }}
      DATABASE_READ_TOKEN: ${{ secrets.DATABASE_READ_TOKEN }}
      DATABASE_ADMIN_TOKEN: ${{ secrets.DATABASE_ADMIN_TOKEN }}
      DATABASE_NAME: ${{ github.event.inputs.database_name }}
      N_SIMS: ${{ github.event.inputs.n_sims }}
      DATA_DIR: ${{ github.workspace }}/playoff_odds_data

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      # ==================== DOWNLOAD FROM Fly.io TO LOCAL DUCKDB ====================
      - name: Download league data to local DuckDB
        working-directory: fantasy_football_data_scripts
        run: |
          echo "========================================"
          echo "Downloading ${DATABASE_NAME} from Fly.io to local DuckDB"
          echo "Data dir: ${DATA_DIR}"
          echo "========================================"

          mkdir -p "${DATA_DIR}"

          python - <<'PYEOF'
          import duckdb
          import json
          import os
          import sys
          import urllib.request

          def fly_query(sql, database="___ops"):
              url = os.environ["DATABASE_SERVER_URL"].rstrip("/") + "/query"
              token = os.environ["DATABASE_READ_TOKEN"]
              data = json.dumps({"sql": sql, "database": database}).encode()
              req = urllib.request.Request(url, data=data, headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {token}",
              })
              with urllib.request.urlopen(req, timeout=120) as resp:
                  return json.loads(resp.read())

          db_name = os.environ['DATABASE_NAME']
          data_dir = os.environ['DATA_DIR']
          local_path = f"{data_dir}/{db_name}.duckdb"

          # Connect to local DuckDB
          local = duckdb.connect(local_path)
          local.execute("CREATE SCHEMA IF NOT EXISTS public")

          # Discover all tables for this league via Fly.io
          tables_result = fly_query(
              "SELECT DISTINCT table_name FROM information_schema.tables "
              "WHERE table_schema = 'public'",
              database=db_name
          )
          table_names = [r["table_name"] for r in tables_result]
          print(f"Found {len(table_names)} tables for {db_name}")

          total_rows = 0
          for table_name in table_names:
              try:
                  # Get row count
                  cnt_result = fly_query(f"SELECT COUNT(*) as cnt FROM public.{table_name}", database=db_name)
                  cnt = cnt_result[0]["cnt"] if cnt_result else 0

                  if cnt == 0:
                      print(f"  SKIP {table_name} (0 rows)")
                      continue

                  # Download data
                  rows = fly_query(f"SELECT * FROM public.{table_name}", database=db_name)

                  if not rows:
                      print(f"  SKIP {table_name} (empty result)")
                      continue

                  # Create table locally from downloaded data
                  local.execute(f"DROP TABLE IF EXISTS public.{table_name}")

                  # Use DuckDB's ability to query from Python objects
                  import pyarrow as pa
                  columns = list(rows[0].keys())
                  arrays = {col: [r.get(col) for r in rows] for col in columns}
                  table = pa.table(arrays)
                  local.execute(f"CREATE TABLE public.{table_name} AS SELECT * FROM table")

                  print(f"  {table_name}: {cnt:,} rows")
                  total_rows += cnt

              except Exception as e:
                  print(f"  ERROR {table_name}: {e}")

          local.close()
          print(f"\nDownloaded {total_rows:,} total rows to {local_path}")
          PYEOF

      # ==================== EXPECTED RECORD CALCULATOR ====================
      - name: Run Expected Record Calculator
        working-directory: fantasy_football_data_scripts
        run: |
          echo "========================================"
          echo "Running Expected Record Calculator"
          echo "========================================"

          python -m multi_league.transformations.matchup.expected_record_v2 \
            --db ${DATABASE_NAME} \
            --data-dir ${DATA_DIR} \
            --n-sims ${N_SIMS} \
            2>&1 | tee ../expected_record.log

          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -eq 0 ]; then
            echo "Expected record calculation complete"
          else
            echo "Expected record calculation failed"
            tail -50 ../expected_record.log
            exit $EXIT_CODE
          fi

      # ==================== PLAYOFF ODDS CALCULATOR ====================
      - name: Run Playoff Odds Calculator (+ clutch equity)
        working-directory: fantasy_football_data_scripts
        run: |
          echo "========================================"
          echo "Running Playoff Odds Calculator"
          echo "========================================"

          python -m multi_league.transformations.matchup.playoff_odds_import \
            --db ${DATABASE_NAME} \
            --data-dir ${DATA_DIR} \
            --n-sims ${N_SIMS} \
            2>&1 | tee ../playoff_odds.log

          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -eq 0 ]; then
            echo "Playoff odds + clutch equity complete"
          else
            echo "Playoff odds calculation failed"
            tail -50 ../playoff_odds.log
            exit $EXIT_CODE
          fi

      # Clutch equity now runs in-process inside playoff_odds_import (no separate step needed)

      # ==================== AGGREGATIONS (LOCAL) ====================
      - name: Re-aggregate matchup tables
        continue-on-error: true
        working-directory: fantasy_football_data_scripts
        run: |
          python -m multi_league.transformations.aggregation.aggregate_matchup_context \
            --db ${DATABASE_NAME} --data-dir ${DATA_DIR} \
            2>&1 | tee ../matchup_aggregation.log
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "Matchup aggregation complete"
          else
            echo "Matchup aggregation failed (non-critical)"
          fi

      - name: Aggregate draft context
        continue-on-error: true
        working-directory: fantasy_football_data_scripts
        run: |
          python -m multi_league.transformations.aggregation.aggregate_draft_context \
            --db ${DATABASE_NAME} --data-dir ${DATA_DIR} \
            2>&1 | tee ../draft_aggregation.log
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "Draft aggregation complete"
          else
            echo "Draft aggregation failed (non-critical)"
          fi

      - name: Aggregate transaction context
        continue-on-error: true
        working-directory: fantasy_football_data_scripts
        run: |
          python -m multi_league.transformations.aggregation.aggregate_transaction_context \
            --db ${DATABASE_NAME} --data-dir ${DATA_DIR} \
            2>&1 | tee ../transaction_aggregation.log
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "Transaction aggregation complete"
          else
            echo "Transaction aggregation failed (non-critical)"
          fi

      - name: Compute homepage summary
        continue-on-error: true
        working-directory: fantasy_football_data_scripts
        run: |
          python -m multi_league.transformations.aggregation.homepage_summary \
            --db ${DATABASE_NAME} --data-dir ${DATA_DIR} \
            2>&1 | tee ../homepage_summary.log

          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -eq 0 ] || [ $EXIT_CODE -eq 139 ]; then
            echo "Homepage summary complete"
          else
            echo "Homepage summary failed (non-critical)"
          fi

      # ==================== UPLOAD RESULTS TO Fly.io ====================
      - name: Upload results to Fly.io
        working-directory: fantasy_football_data_scripts
        run: |
          echo "========================================"
          echo "Uploading results to Fly.io"
          echo "========================================"

          python -c "
          import sys
          sys.path.insert(0, '.')
          from multi_league.core.local_db import LocalLeagueDB

          db = LocalLeagueDB('${DATA_DIR}', '${DATABASE_NAME}')
          db.connect()
          db.upload_to_fly('${DATABASE_NAME}')
          db.close()
          print('Upload to Fly complete')
          "

      # ==================== VERIFY ====================
      - name: Verify results
        run: |
          python - <<'PYEOF'
          import json, os, urllib.request

          def fly_query(sql, database="___ops"):
              url = os.environ["DATABASE_SERVER_URL"].rstrip("/") + "/query"
              token = os.environ["DATABASE_READ_TOKEN"]
              data = json.dumps({"sql": sql, "database": database}).encode()
              req = urllib.request.Request(url, data=data, headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {token}",
              })
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.loads(resp.read())

          db_name = os.environ['DATABASE_NAME']

          print("Expected record columns check:")
          for col in ['shuffle_avg_wins', 'shuffle_avg_seed', 'wins_vs_shuffle_wins']:
              try:
                  rows = fly_query(f'SELECT COUNT("{col}") as cnt FROM public.matchup WHERE "{col}" IS NOT NULL', database=db_name)
                  print(f"  {col}: {rows[0]['cnt']:,} non-null values")
              except Exception as e:
                  print(f"  {col}: {e}")

          print("\nPlayoff odds columns check:")
          for col in ['p_playoffs', 'p_bye', 'p_champ', 'avg_seed', 'power_rating']:
              try:
                  rows = fly_query(f'SELECT COUNT("{col}") as cnt FROM public.matchup WHERE "{col}" IS NOT NULL', database=db_name)
                  print(f"  {col}: {rows[0]['cnt']:,} non-null values")
              except Exception as e:
                  print(f"  {col}: {e}")

          print("\nClutch equity check:")
          try:
              rows = fly_query("SELECT COUNT(clutch_equity) as cnt FROM public.player_fantasy WHERE clutch_equity IS NOT NULL AND clutch_equity != 0", database=db_name)
              print(f"  clutch_equity: {rows[0]['cnt']:,} non-zero values")
          except Exception as e:
              print(f"  clutch_equity: {e}")

          rows = fly_query("SELECT COUNT(*) as cnt FROM public.matchup", database=db_name)
          print(f"\nTotal matchup rows for {db_name}: {rows[0]['cnt']:,}")
          PYEOF

      # ==================== CLEANUP ====================
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playoff-odds-${{ github.event.inputs.user_id || github.event.inputs.database_name }}
          path: |
            expected_record.log
            playoff_odds.log
            matchup_aggregation.log
            draft_aggregation.log
            transaction_aggregation.log
            homepage_summary.log
          retention-days: 7

      - name: Create workflow summary
        if: always()
        run: |
          echo "# Playoff Odds Calculation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Database**: ${DATABASE_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "- **Simulations**: ${N_SIMS}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Architecture" >> $GITHUB_STEP_SUMMARY
          echo "1. Download league data from Fly.io to local DuckDB" >> $GITHUB_STEP_SUMMARY
          echo "2. Run all sims + aggregations locally (free GH Actions compute)" >> $GITHUB_STEP_SUMMARY
          echo "3. Upload results back to Fly.io" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Download \`${DATABASE_NAME}\` → local DuckDB" >> $GITHUB_STEP_SUMMARY
          echo "2. Expected record (shuffle sims)" >> $GITHUB_STEP_SUMMARY
          echo "3. Playoff odds + clutch equity" >> $GITHUB_STEP_SUMMARY
          echo "4. Aggregation (matchup, draft, transaction, homepage)" >> $GITHUB_STEP_SUMMARY
          echo "5. Upload all results → Fly.io" >> $GITHUB_STEP_SUMMARY
