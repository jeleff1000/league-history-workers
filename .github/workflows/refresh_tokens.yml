name: Refresh OAuth Tokens

# Manual workflow to refresh/update OAuth tokens for leagues
# Use this when tokens expire or after changing Yahoo app credentials

on:
  workflow_dispatch:
    inputs:
      refresh_token:
        description: 'Refresh token from local Streamlit auth (paste from oauth/Oauth.json)'
        required: true
        type: string
      target_database:
        description: 'Target database (leave empty for ALL leagues)'
        required: false
        type: string
      update_master_secret:
        description: 'Also show instructions to update YAHOO_MASTER_REFRESH_TOKEN'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  refresh-tokens:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          repository: jeleff1000/yahoo_oauth
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests cryptography yahoo_oauth

      - name: Validate and refresh token
        id: validate
        env:
          YAHOO_CLIENT_ID: ${{ secrets.YAHOO_CLIENT_ID }}
          YAHOO_CLIENT_SECRET: ${{ secrets.YAHOO_CLIENT_SECRET }}
          DATABASE_BACKEND: fly
          DATABASE_SERVER_URL: ${{ secrets.DATABASE_SERVER_URL }}
          DATABASE_READ_TOKEN: ${{ secrets.DATABASE_READ_TOKEN }}
          DATABASE_ADMIN_TOKEN: ${{ secrets.DATABASE_ADMIN_TOKEN }}
          FLY_PRIMARY_MACHINE_ID: ${{ secrets.FLY_PRIMARY_MACHINE_ID }}
          FLY_REPLICA_MACHINE_IDS: ${{ secrets.FLY_REPLICA_MACHINE_IDS }}
          CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
          INPUT_REFRESH_TOKEN: ${{ github.event.inputs.refresh_token }}
          TARGET_DB: ${{ github.event.inputs.target_database }}
        run: |
          python - <<'PYEOF'
          import os
          import sys
          import json
          import time
          import requests
          import urllib.request

          def fly_query(sql, database="___ops"):
              url = os.environ["DATABASE_SERVER_URL"].rstrip("/") + "/query"
              token = os.environ["DATABASE_READ_TOKEN"]
              data = json.dumps({"sql": sql, "database": database}).encode()
              req = urllib.request.Request(url, data=data, headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {token}",
              })
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.loads(resp.read())

          # Get inputs
          refresh_token = os.environ.get('INPUT_REFRESH_TOKEN', '').strip()
          consumer_key = os.environ.get('YAHOO_CLIENT_ID')
          consumer_secret = os.environ.get('YAHOO_CLIENT_SECRET')
          encryption_key = os.environ.get('CREDENTIAL_ENCRYPTION_KEY')
          target_db = os.environ.get('TARGET_DB', '').strip()

          if not refresh_token:
              print("No refresh token provided")
              sys.exit(1)

          if not consumer_key or not consumer_secret:
              print("YAHOO_CLIENT_ID or YAHOO_CLIENT_SECRET not set in secrets")
              sys.exit(1)

          print("=" * 60)
          print("STEP 1: Validating refresh token with Yahoo")
          print("=" * 60)

          # Use direct HTTP request to refresh token (avoids yahoo_oauth interactive fallback)
          token_url = "https://api.login.yahoo.com/oauth2/get_token"

          try:
              response = requests.post(
                  token_url,
                  data={
                      'grant_type': 'refresh_token',
                      'refresh_token': refresh_token,
                      'client_id': consumer_key,
                      'client_secret': consumer_secret,
                  },
                  headers={'Content-Type': 'application/x-www-form-urlencoded'},
                  timeout=30
              )

              if response.status_code != 200:
                  print(f"Token refresh failed: {response.status_code}")
                  print(f"   Response: {response.text[:500]}")
                  print("\nCommon causes:")
                  print("  1. Refresh token was created with different Yahoo app credentials")
                  print("  2. Refresh token has expired")
                  print("  3. Yahoo app was deleted or modified")
                  sys.exit(1)

              tokens = response.json()
              new_access_token = tokens.get('access_token')
              new_refresh_token = tokens.get('refresh_token', refresh_token)

              if not new_access_token:
                  print(f"No access_token in response: {tokens}")
                  sys.exit(1)

              print(f"Token validated successfully!")
              print(f"   Access token: {new_access_token[:30]}...")
              print(f"   Refresh token: {new_refresh_token[:30]}...")

              # Test an API call
              print("\n   Testing Yahoo API call...")
              test_url = "https://fantasysports.yahooapis.com/fantasy/v2/users;use_login=1/games?format=json"
              test_resp = requests.get(
                  test_url,
                  headers={'Authorization': f'Bearer {new_access_token}'},
                  timeout=30
              )
              if test_resp.status_code == 200:
                  print("   API call successful - token is fully working!")
              else:
                  print(f"   API call returned {test_resp.status_code} - token may have limited access")

          except Exception as e:
              print(f"Token validation failed: {e}")
              sys.exit(1)

          print("\n" + "=" * 60)
          print("STEP 2: Discovering league databases")
          print("=" * 60)

          # Find all league databases from registry via Fly.io
          registry_rows = fly_query("""
              SELECT DISTINCT database_name FROM (
                  SELECT database_name FROM main.league_credentials
                  UNION ALL
                  SELECT database_name FROM main.sleeper_leagues
                  UNION ALL
                  SELECT database_name FROM main.espn_leagues
              )
              ORDER BY database_name
          """)
          league_dbs = [row["database_name"] for row in registry_rows if row.get("database_name")]

          print(f"Found {len(league_dbs)} league databases")

          # Filter to target if specified
          if target_db:
              if target_db in league_dbs:
                  league_dbs = [target_db]
                  print(f"Targeting specific database: {target_db}")
              else:
                  print(f"Target database '{target_db}' not found in league list")
                  sys.exit(1)

          print("\n" + "=" * 60)
          print("STEP 3: Credential update")
          print("=" * 60)

          # NOTE: On Fly.io, credential writes are managed separately.
          # This workflow validates the token and reports which leagues would be updated.
          # Actual credential storage is handled by the import pipeline.
          print(f"Token is valid. {len(league_dbs)} leagues would be updated.")
          print("NOTE: Credential writes are managed by the import pipeline on Fly.io.")

          # Do NOT write the refresh token to step outputs — that surfaces it in the run log.
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"leagues_updated=0\n")

          PYEOF

      - name: Create summary
        if: always()
        env:
          UPDATE_MASTER: ${{ github.event.inputs.update_master_secret }}
        run: |
          echo "# OAuth Token Refresh Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.validate.outcome }}" == "success" ]; then
            echo "## ✅ Token Refresh Successful" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Leagues Updated**: ${{ steps.validate.outputs.leagues_updated }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Token Source**: Manual input" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$UPDATE_MASTER" == "true" ]; then
              echo "## 📝 Update YAHOO_MASTER_REFRESH_TOKEN" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "To update your master fallback token:" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "1. Go to **Settings → Secrets and variables → Actions**" >> $GITHUB_STEP_SUMMARY
              echo "2. Edit \`YAHOO_MASTER_REFRESH_TOKEN\`" >> $GITHUB_STEP_SUMMARY
              echo "3. Paste your refresh token (same one you used here)" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "> This ensures weekly updates have a fallback if per-league tokens fail" >> $GITHUB_STEP_SUMMARY
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Next Steps" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Your weekly updates should now work! The tokens will auto-refresh each week." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Token Refresh Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the logs above for details." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Common Solutions" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "1. **Get a fresh token**: Run Streamlit locally, authenticate with Yahoo" >> $GITHUB_STEP_SUMMARY
            echo "2. **Check Yahoo app**: Make sure YAHOO_CLIENT_ID and YAHOO_CLIENT_SECRET match your app" >> $GITHUB_STEP_SUMMARY
            echo "3. **Re-import leagues**: If tokens are completely dead, re-import via Streamlit" >> $GITHUB_STEP_SUMMARY
          fi
