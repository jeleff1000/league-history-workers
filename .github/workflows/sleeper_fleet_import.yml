name: Sleeper Fleet Import

# Imports multiple Sleeper leagues in parallel using matrix strategy.
# Each league runs as its own independent job so failures are isolated.
#
# Usage:
#   Manual: provide leagues_json with array of {sleeper_league_id, database_name, start_year}
#   Or: set source=motherduck to auto-discover from ___ops via Fly.io
#   Or: set source=test to run the 7 test leagues

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'League source: "full" (paid/grandfathered), "quick" (free only), "motherduck" (all), "test", or "custom"'
        required: true
        type: choice
        options:
          - full
          - quick
          - motherduck
          - test
          - custom
        default: full
      leagues_json:
        description: 'JSON array of leagues (only used when source=custom). Format: [{"sleeper_league_id":"...", "database_name":"...", "start_year":2021}]'
        required: false
        type: string
      max_parallel:
        description: 'Max parallel imports (GitHub free = 20 concurrent jobs)'
        required: false
        type: number
        default: 5
      batch:
        description: 'Batch number for motherduck source (1=first 250, 2=remaining). Ignored for test/custom.'
        required: false
        type: number
        default: 1
      exclude_dbs:
        description: 'Comma-separated database names to skip (e.g. already reimported)'
        required: false
        type: string
      dry_run:
        description: 'Dry run - discover leagues but skip import'
        required: false
        type: boolean
        default: false
      yahoo_oauth_ref:
        description: 'yahoo_oauth branch/ref to check out (default main)'
        required: false
        type: string
        default: 'main'

permissions:
  actions: write
  contents: read

jobs:
  # ================================================================
  # Job 1: Discover leagues and build the matrix
  # ================================================================
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      league_count: ${{ steps.build.outputs.league_count }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          repository: jeleff1000/yahoo_oauth
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build league matrix
        id: build
        env:
          DATABASE_SERVER_URL: ${{ secrets.DATABASE_SERVER_URL }}
          DATABASE_READ_TOKEN: ${{ secrets.DATABASE_READ_TOKEN }}
          SOURCE: ${{ github.event.inputs.source }}
          LEAGUES_JSON: ${{ github.event.inputs.leagues_json }}
          BATCH: ${{ github.event.inputs.batch || '1' }}
          EXCLUDE_DBS: ${{ github.event.inputs.exclude_dbs || '' }}
        run: |
          python - <<'PYEOF'
          import json, os, sys, urllib.request

          def fly_query(sql, database="___ops"):
              url = os.environ["DATABASE_SERVER_URL"].rstrip("/") + "/query"
              token = os.environ["DATABASE_READ_TOKEN"]
              data = json.dumps({"sql": sql, "database": database}).encode()
              req = urllib.request.Request(url, data=data, headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {token}",
              })
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.loads(resp.read())

          source = os.environ.get("SOURCE", "test")
          leagues_json_raw = os.environ.get("LEAGUES_JSON", "")

          if source == "custom" and leagues_json_raw:
              leagues = json.loads(leagues_json_raw)

          elif source == "test":
              # 7 Sleeper test leagues with correct IDs and actual start years
              leagues = [
                  {"sleeper_league_id": "1253478574636138496", "database_name": "champions_branch_out", "import_mode": "full"},
                  {"sleeper_league_id": "1314686478772600832", "database_name": "degenerate_gamblers_football_league", "import_mode": "full"},
                  {"sleeper_league_id": "1209663934118768640", "database_name": "l_14_big_booms", "import_mode": "full"},
                  {"sleeper_league_id": "1194644814116040704", "database_name": "nyu_ffl", "import_mode": "full"},
                  {"sleeper_league_id": "1312076046484373504", "database_name": "playing_for_keeps_league", "import_mode": "full"},
                  {"sleeper_league_id": "1257088277819691008", "database_name": "the_real_ff_league", "import_mode": "full"},
                  {"sleeper_league_id": "1180216138503110656", "database_name": "zootown_dynasty", "import_mode": "full"},
              ]

          elif source in ("motherduck", "full", "quick"):
              # Read from league_inventory via Fly.io DuckDB server
              raw_rows = fly_query("""
                  SELECT league_id, database_name, entitled_mode
                  FROM accounts.league_inventory
                  WHERE platform = 'sleeper'
                    AND league_id IS NOT NULL
                  ORDER BY database_name
              """)
              rows = [(r["league_id"], r["database_name"], r["entitled_mode"]) for r in raw_rows]

              # Deduplicate by database_name, take the latest (highest numeric) league_id
              db_map = {}
              for lid, db, mode in rows:
                  try:
                      lid_int = int(lid)
                  except (ValueError, TypeError):
                      continue
                  if db not in db_map or lid_int > db_map[db]["lid_int"]:
                      db_map[db] = {"lid_int": lid_int, "sleeper_league_id": str(lid), "database_name": db, "import_mode": mode or "quick"}

              all_leagues = sorted(db_map.values(), key=lambda x: x["database_name"])

              # Filter by source type
              if source == "full":
                  all_leagues = [v for v in all_leagues if v["import_mode"] == "full"]
                  print(f"Full-only fleet: {len(all_leagues)} paid/grandfathered leagues")
              elif source == "quick":
                  all_leagues = [v for v in all_leagues if v["import_mode"] == "quick"]
                  print(f"Quick-only fleet: {len(all_leagues)} free leagues")
              else:
                  # "motherduck" = all leagues, respecting entitled_mode
                  print(f"All leagues: {len(all_leagues)} ({sum(1 for v in all_leagues if v['import_mode'] == 'full')} full, {sum(1 for v in all_leagues if v['import_mode'] != 'full')} quick)")

              # Exclude specific databases
              exclude = set(x.strip() for x in os.environ.get("EXCLUDE_DBS", "").split(",") if x.strip())
              if exclude:
                  all_leagues = [v for v in all_leagues if v["database_name"] not in exclude]
                  print(f"Excluding {len(exclude)} databases: {exclude}")

              # Batch: split into chunks of 250 (GH Actions matrix limit = 256)
              batch = int(os.environ.get("BATCH", "1"))
              batch_size = 250
              start = (batch - 1) * batch_size
              end = start + batch_size
              batched = all_leagues[start:end]
              print(f"Batch {batch}: leagues {start+1}-{min(end, len(all_leagues))} of {len(all_leagues)}")

              leagues = [
                  {"sleeper_league_id": v["sleeper_league_id"], "database_name": v["database_name"], "import_mode": v["import_mode"]}
                  for v in batched
              ]
          else:
              print(f"ERROR: Unknown source '{source}'")
              sys.exit(1)

          # Validate
          for lg in leagues:
              assert lg.get("sleeper_league_id"), f"Missing sleeper_league_id: {lg}"
              assert lg.get("database_name"), f"Missing database_name: {lg}"
              if "import_mode" not in lg:
                  lg["import_mode"] = "quick"

          matrix = {"include": leagues}

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
              f.write(f"league_count={len(leagues)}\n")

          print(f"Discovered {len(leagues)} leagues:")
          for lg in leagues:
              print(f"  {lg['database_name']} (ID={lg['sleeper_league_id']}, mode={lg['import_mode']})")
          PYEOF

  # ================================================================
  # Job 1.5: Build or restore ___ops cache
  # ================================================================
  build-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          repository: jeleff1000/yahoo_oauth
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Restore ops cache
        id: cache
        uses: actions/cache@v5
        with:
          path: ops_cache
          key: ops-cache-v1-${{ hashFiles('fantasy_football_data_scripts/build_ops_cache.py') }}
          restore-keys: ops-cache-v1-

      - name: Build ops cache (on miss)
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          DATABASE_SERVER_URL: ${{ secrets.DATABASE_SERVER_URL }}
          DATABASE_READ_TOKEN: ${{ secrets.DATABASE_READ_TOKEN }}
        run: |
          pip install duckdb==1.5.1
          python fantasy_football_data_scripts/build_ops_cache.py \
            --output ops_cache/ops_cache.duckdb

  # ================================================================
  # Job 2: Import each league in parallel (matrix)
  # ================================================================
  import-league:
    needs: [discover, build-cache]
    if: ${{ !inputs.dry_run && fromJson(needs.discover.outputs.league_count) > 0 }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    concurrency:
      group: central-db-write-${{ matrix.database_name }}
      cancel-in-progress: false

    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
      max-parallel: ${{ fromJson(github.event.inputs.max_parallel || '5') }}
      fail-fast: false  # Don't cancel other leagues if one fails

    env:
      PYTHONUNBUFFERED: 1
      DB_NAME: ${{ matrix.database_name }}
      SLEEPER_LEAGUE_ID: ${{ matrix.sleeper_league_id }}
      IMPORT_MODE: ${{ matrix.import_mode }}
      OPS_CACHE_PATH: ${{ github.workspace }}/ops_cache/ops_cache.duckdb
      DATABASE_BACKEND: fly
      DATABASE_SERVER_URL: ${{ secrets.DATABASE_SERVER_URL }}
      DATABASE_READ_TOKEN: ${{ secrets.DATABASE_READ_TOKEN }}
      DATABASE_ADMIN_TOKEN: ${{ secrets.DATABASE_ADMIN_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          repository: jeleff1000/yahoo_oauth
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.inputs.yahoo_oauth_ref || 'main' }}

      - name: Restore ops cache
        uses: actions/cache@v5
        with:
          path: ops_cache
          key: ops-cache-v1-${{ hashFiles('fantasy_football_data_scripts/build_ops_cache.py') }}
          restore-keys: ops-cache-v1-

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache Python virtualenv
        uses: actions/cache@v5
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('requirements.txt') }}

      - name: Create virtualenv
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Activate venv
        run: echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      # ==================== IMPORT ====================
      - name: Run import
        id: import
        working-directory: fantasy_football_data_scripts
        run: |
          source ../.venv/bin/activate
          echo "========================================"
          echo "Importing: ${{ env.DB_NAME }}"
          echo "League ID: ${{ env.SLEEPER_LEAGUE_ID }}"
          echo "Import mode: ${{ env.IMPORT_MODE }}"
          echo "========================================"

          DATA_DIR="${{ github.workspace }}/fantasy_football_data/sleeper_${{ env.DB_NAME }}"
          mkdir -p "$DATA_DIR"

          set +e
          python sleeper_initial_import.py \
            --league-id ${{ env.SLEEPER_LEAGUE_ID }} \
            --data-dir "$DATA_DIR" \
            --import-mode ${{ env.IMPORT_MODE }} \
            --database-name ${{ env.DB_NAME }} \
            --skip-track-2-upload \
            2>&1 | tee ../import_${{ env.DB_NAME }}.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT
          echo "data_dir=${DATA_DIR}" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -ne 0 ]; then
            echo "IMPORT FAILED for ${{ env.DB_NAME }} (exit code ${EXIT_CODE})"
            tail -100 ../import_${{ env.DB_NAME }}.log
            exit $EXIT_CODE
          fi

      # ==================== DIAGNOSTICS: is_playoffs checkpoint ====================
      - name: "[DIAG] is_playoffs after import"
        if: steps.import.outputs.exit_code == '0'
        continue-on-error: true
        run: |
          cd fantasy_football_data_scripts
          python -c "
          import duckdb
          from pathlib import Path
          p = Path('${{ steps.import.outputs.data_dir }}') / '${{ env.DB_NAME }}.duckdb'
          conn = duckdb.connect(str(p), read_only=True)
          rows = conn.execute('''
              SELECT year,
                     SUM(CASE WHEN CAST(is_playoffs AS INTEGER) = 1 THEN 1 ELSE 0 END) as po,
                     SUM(CASE WHEN CAST(champion AS INTEGER) = 1 THEN 1 ELSE 0 END) as ch,
                     typeof(is_playoffs) as tp
              FROM public.matchup GROUP BY year ORDER BY year
          ''').fetchall()
          for r in rows:
              status = 'OK' if r[1] > 0 else '*** MISSING ***'
              print(f'[DIAG:post-import] {r[0]}: is_playoffs={r[1]}, champion={r[2]}, type={r[3]} {status}')
          conn.close()
          "

      # ==================== SIMS ====================
      - name: Calculate expected records
        if: steps.import.outputs.exit_code == '0'
        continue-on-error: true
        run: |
          cd fantasy_football_data_scripts
          python -m multi_league.transformations.matchup.expected_record_v2 \
            --db ${{ env.DB_NAME }} \
            --data-dir ${{ steps.import.outputs.data_dir }} \
            --n-sims 10000

      - name: "[DIAG] is_playoffs after expected_record"
        if: steps.import.outputs.exit_code == '0'
        continue-on-error: true
        run: |
          cd fantasy_football_data_scripts
          python -c "
          import duckdb
          from pathlib import Path
          p = Path('${{ steps.import.outputs.data_dir }}') / '${{ env.DB_NAME }}.duckdb'
          conn = duckdb.connect(str(p), read_only=True)
          rows = conn.execute('''
              SELECT year,
                     SUM(CASE WHEN CAST(is_playoffs AS INTEGER) = 1 THEN 1 ELSE 0 END) as po
              FROM public.matchup GROUP BY year ORDER BY year
          ''').fetchall()
          for r in rows:
              status = 'OK' if r[1] > 0 else '*** MISSING ***'
              print(f'[DIAG:post-expected-record] {r[0]}: is_playoffs={r[1]} {status}')
          conn.close()
          "

      - name: Calculate playoff odds
        if: steps.import.outputs.exit_code == '0'
        continue-on-error: true
        run: |
          cd fantasy_football_data_scripts
          python -m multi_league.transformations.matchup.playoff_odds_import \
            --db ${{ env.DB_NAME }} \
            --data-dir ${{ steps.import.outputs.data_dir }} \
            --n-sims 10000

      - name: "[DIAG] is_playoffs after playoff_odds"
        if: steps.import.outputs.exit_code == '0'
        continue-on-error: true
        run: |
          cd fantasy_football_data_scripts
          python -c "
          import duckdb
          from pathlib import Path
          p = Path('${{ steps.import.outputs.data_dir }}') / '${{ env.DB_NAME }}.duckdb'
          conn = duckdb.connect(str(p), read_only=True)
          rows = conn.execute('''
              SELECT year,
                     SUM(CASE WHEN CAST(is_playoffs AS INTEGER) = 1 THEN 1 ELSE 0 END) as po
              FROM public.matchup GROUP BY year ORDER BY year
          ''').fetchall()
          for r in rows:
              status = 'OK' if r[1] > 0 else '*** MISSING ***'
              print(f'[DIAG:post-playoff-odds] {r[0]}: is_playoffs={r[1]} {status}')
          conn.close()
          "

      # Populates keeper_year (consecutive years a player was kept by the same
      # franchise) in player_fantasy. Previously orphaned — only callable from
      # LeagueSession which the live fleet importer doesn't use. Wire it as a
      # first-class workflow step so keepers_keeper_year_populated clears.
      - name: Calculate keeper economics
        if: steps.import.outputs.exit_code == '0'
        continue-on-error: true
        run: |
          cd fantasy_football_data_scripts
          python -m multi_league.transformations.player.keeper_economics \
            --db ${{ env.DB_NAME }} \
            --data-dir ${{ steps.import.outputs.data_dir }}

      # ==================== AGGREGATIONS ====================
      - name: Run aggregations
        if: steps.import.outputs.exit_code == '0'
        continue-on-error: true
        run: |
          cd fantasy_football_data_scripts
          python -m multi_league.transformations.aggregation.aggregate_matchup_context \
            --db ${{ env.DB_NAME }} --data-dir ${{ steps.import.outputs.data_dir }}
          python -m multi_league.transformations.aggregation.aggregate_fantasy_context \
            --db ${{ env.DB_NAME }} --data-dir ${{ steps.import.outputs.data_dir }}
          python -m multi_league.transformations.aggregation.aggregate_draft_context \
            --db ${{ env.DB_NAME }} --data-dir ${{ steps.import.outputs.data_dir }}
          python -m multi_league.transformations.aggregation.aggregate_transaction_context \
            --db ${{ env.DB_NAME }} --data-dir ${{ steps.import.outputs.data_dir }}
          python -m multi_league.transformations.aggregation.aggregate_standings \
            --db ${{ env.DB_NAME }} --data-dir ${{ steps.import.outputs.data_dir }}
          python -m multi_league.transformations.aggregation.homepage_summary \
            --db ${{ env.DB_NAME }} --data-dir ${{ steps.import.outputs.data_dir }}

      # ==================== UPLOAD ====================
      - name: Upload to database
        if: steps.import.outputs.exit_code == '0'
        run: |
          cd fantasy_football_data_scripts
          python -c "
          from multi_league.core.local_db import LocalLeagueDB
          db = LocalLeagueDB('${{ steps.import.outputs.data_dir }}', '${{ env.DB_NAME }}')
          db.connect()
          db.upload_to_fly('${{ env.DB_NAME }}')
          print('Upload to Fly complete: ${{ env.DB_NAME }}')
          db.close()
          "

      # ==================== STATUS ====================
      - name: Print status
        if: always()
        run: |
          echo "========================================"
          echo "RESULT: ${{ env.DB_NAME }}"
          echo "Import: ${{ steps.import.outputs.exit_code == '0' && 'SUCCESS' || 'FAILED' }}"
          echo "========================================"

  # ================================================================
  # Job 3: Summary
  # ================================================================
  summary:
    needs: [discover, import-league]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fleet summary
        run: |
          echo "========================================"
          echo "SLEEPER FLEET IMPORT COMPLETE"
          echo "========================================"
          echo "Leagues attempted: ${{ needs.discover.outputs.league_count }}"
          echo "Source: ${{ github.event.inputs.source }}"
          echo "Max parallel: ${{ github.event.inputs.max_parallel || 5 }}"
          echo "Dry run: ${{ github.event.inputs.dry_run }}"
          echo "========================================"
