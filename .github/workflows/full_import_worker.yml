name: Full Import Worker (All Historical Years)

# This workflow imports ALL historical years and merges with existing data.
# Triggered by quick_import_worker.yml after current year is imported.
# Does NOT drop tables - preserves quick import data and merges historical data.

on:
  workflow_dispatch:
    inputs:
      league_data_b64:
        description: 'Base64-encoded JSON with league configuration'
        required: false
        type: string
      user_id:
        description: 'Unique identifier for this user/import job'
        required: true
        type: string

  repository_dispatch:
    types: [full_import]

# Prevent multiple imports for the same user running simultaneously
# If a new import is triggered while one is running, cancel the old one
concurrency:
  group: league-import-${{ github.event.inputs.user_id || github.event.client_payload.user_id }}
  cancel-in-progress: false  # Don't cancel - let the first one finish

permissions:
  actions: write
  contents: read

jobs:
  import-league-data:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PYTHONUNBUFFERED: 1
      IMPORT_PIPELINE_V2: ${{ vars.IMPORT_PIPELINE_V2 }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          repository: jeleff1000/yahoo_oauth
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache Python virtualenv
        uses: actions/cache@v5
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('requirements.txt') }}

      - name: Create virtualenv
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: python -m venv .venv
      - name: Install dependencies
        run: |
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Activate virtualenv
        run: echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      # ==================== PARSE LEAGUE DATA ====================
      - name: Parse league data
        id: parse
        uses: ./.github/actions/parse-league-data
        with:
          league_data_b64: ${{ github.event.inputs.league_data_b64 || github.event.client_payload.league_data_b64 || '' }}
          import_mode: 'full'  # ALWAYS full - this is the full import worker
          yahoo_client_id: ${{ secrets.YAHOO_CLIENT_ID }}
          yahoo_client_secret: ${{ secrets.YAHOO_CLIENT_SECRET }}
          motherduck_token: ${{ secrets.MOTHERDUCK_TOKEN }}

      # ==================== UPDATE JOB STATUS - STARTING ====================

      # ==================== REFRESH OAUTH TOKEN ====================
      - name: Refresh OAuth token
        env:
          YAHOO_CLIENT_ID: ${{ secrets.YAHOO_CLIENT_ID }}
          YAHOO_CLIENT_SECRET: ${{ secrets.YAHOO_CLIENT_SECRET }}
        run: |
          echo "Refreshing OAuth token..."
          python - <<'PYEOF'
          import json
          import os
          import time
          import requests

          with open("oauth/Oauth.json", 'r') as f:
              oauth_data = json.load(f)

          refresh_token = oauth_data.get('refresh_token')
          if not refresh_token:
              print("No refresh_token found - will try with existing access_token")
              exit(0)

          consumer_key = os.environ.get('YAHOO_CLIENT_ID')
          consumer_secret = os.environ.get('YAHOO_CLIENT_SECRET')

          if not consumer_key or not consumer_secret:
              print("Missing Yahoo credentials - cannot refresh token")
              exit(0)

          try:
              response = requests.post(
                  "https://api.login.yahoo.com/oauth2/get_token",
                  data={
                      'grant_type': 'refresh_token',
                      'refresh_token': refresh_token,
                      'client_id': consumer_key,
                      'client_secret': consumer_secret,
                  },
                  headers={'Content-Type': 'application/x-www-form-urlencoded'},
                  timeout=30
              )

              if response.status_code == 200:
                  new_tokens = response.json()
                  oauth_data['access_token'] = new_tokens.get('access_token')
                  oauth_data['refresh_token'] = new_tokens.get('refresh_token', refresh_token)
                  oauth_data['token_time'] = time.time()
                  oauth_data['expires_in'] = new_tokens.get('expires_in', 3600)

                  with open("oauth/Oauth.json", 'w') as f:
                      json.dump(oauth_data, f, indent=2)

                  print(f"Token refreshed successfully!")
              else:
                  print(f"Token refresh failed: {response.status_code}")
          except Exception as e:
              print(f"Token refresh error: {e}")
          PYEOF

      # ==================== STORE CREDENTIALS (EARLY) ====================
      # Store credentials immediately after token refresh so they're available
      # for debugging even if the import fails downstream.
      - name: Store credentials (early)
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
          DATABASE_NAME: ${{ steps.parse.outputs.database_name }}
          LEAGUE_ID: ${{ steps.parse.outputs.league_id }}
          LEAGUE_NAME: ${{ steps.parse.outputs.league_name }}
        run: |
          if [ -z "$CREDENTIAL_ENCRYPTION_KEY" ]; then
            echo "CREDENTIAL_ENCRYPTION_KEY not set - skipping"
            exit 0
          fi

          python - <<'PYEOF'
          import json
          import sys
          sys.path.insert(0, 'fantasy_football_data_scripts')

          from multi_league.utils.credential_store import store_league_credentials
          import os

          with open("oauth/Oauth.json", 'r') as f:
              oauth_data = json.load(f)

          refresh_token = oauth_data.get('refresh_token')
          if not refresh_token:
              print("No refresh_token found - skipping early credential store")
              exit(0)

          store_league_credentials(
              database_name=os.environ['DATABASE_NAME'],
              refresh_token=refresh_token,
              league_id=os.environ['LEAGUE_ID'],
              league_name=os.environ['LEAGUE_NAME']
          )
          print("Credentials stored (early)")
          PYEOF

      # ==================== CREATE DATA DIRECTORIES ====================
      - name: Create data directory
        run: |
          mkdir -p fantasy_football_data/{matchup_data,player_data,draft_data,transaction_data,schedule_data}

      # ==================== CREATE LEAGUE CONTEXT ====================
      - name: Create league context
        env:
          IMPORT_MODE: ${{ steps.parse.outputs.import_mode }}
        run: |
          python - <<'PYEOF'
          import json
          import os
          from pathlib import Path

          with open("league_data_input.json") as f:
              league_data = json.load(f)

          oauth_file = Path("oauth/Oauth.json").resolve()
          import_mode = os.environ.get('IMPORT_MODE', 'full').strip().lower()

          # Get year range from league data
          # Don't use hardcoded defaults - require start_year to be provided
          if not league_data.get('start_year'):
              print("[ERROR] start_year is required in league_data")
              exit(1)

          start_year = int(league_data.get('start_year'))
          end_year = int(league_data.get('season', league_data.get('end_year')))

          # Store the ACTUAL start year (including any staging data years)
          actual_start_year = league_data.get('actual_start_year', start_year)

          print(f"[FULL IMPORT] Importing years: {start_year}-{end_year}")
          if actual_start_year != start_year:
              print(f"[FULL IMPORT] Including staging data from: {actual_start_year}")

          context = {
              "league_id": league_data.get('league_id'),
              "league_name": league_data.get('league_name'),
              "oauth_file_path": str(oauth_file),
              "game_code": league_data.get('game_code', 'nfl'),
              "start_year": start_year,
              "end_year": end_year,
              "num_teams": int(league_data.get('num_teams', 10)),
              "playoff_teams": int(league_data.get('playoff_teams', 6)),
              "regular_season_weeks": int(league_data.get('regular_season_weeks', 14)),
              "data_directory": str(Path("fantasy_football_data").resolve()),
              "max_workers": 5,
              "enable_caching": True,
              "rate_limit_per_sec": 4.0,
              "manager_name_overrides": league_data.get('manager_name_overrides', {}),
              "keeper_rules": league_data.get('keeper_rules'),
              "has_external_data": league_data.get('has_external_data', False),
              "import_mode": import_mode,
              "motherduck_db_name": "${{ steps.parse.outputs.database_name }}",
          }

          # Pass through league_ids mapping (year → league_key) for combined leagues
          if league_data.get('league_ids'):
              context['league_ids'] = league_data['league_ids']
              print(f"[FULL IMPORT] league_ids mapping: {len(context['league_ids'])} years")

          with open("league_context.json", 'w') as f:
              json.dump(context, f, indent=2)

          print(f"League context created: {start_year}-{end_year} (mode: {import_mode}, db: {context.get('motherduck_db_name', 'N/A')})")

          # Debug: Show what was actually written to the context file
          print("\n[DEBUG] Context file contents:")
          print(json.dumps(context, indent=2))
          PYEOF

      # ==================== DIAGNOSE CONFIGURATION ====================
      # Run diagnostic checks to catch issues early before wasting time on failed imports
      - name: Diagnose configuration
        run: |
          echo "========================================"
          echo "Running import configuration diagnostics"
          echo "========================================"
          python diagnose_import_failure.py || {
            echo ""
            echo "⚠️ Diagnostic checks found issues but continuing anyway"
            echo "Check the output above for details"
          }

      # NOTE: Full imports do NOT drop tables - they merge with existing data
      # The quick import already populated current year data, we preserve that

      # ==================== RUN INITIAL IMPORT ====================
      - name: Run initial import
        id: import
        env:
          AUTO_CONFIRM: "1"
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        working-directory: fantasy_football_data_scripts
        run: |
          echo "========================================"
          echo "Starting import for ${{ steps.parse.outputs.league_name }}"
          echo "Season: ${{ steps.parse.outputs.season }}"
          echo "Import Mode: ${{ steps.parse.outputs.import_mode }}"
          echo "Years: ${{ steps.parse.outputs.start_year }}-${{ steps.parse.outputs.season }}"
          echo "========================================"

          # Run import with detailed error capture
          echo "🔀 Branch: ${{ github.ref_name }} | Script: initial_import_v3.py (v3 in-process pipeline)"
          ls -la initial_import_v3.py || { echo "❌ initial_import_v3.py NOT FOUND — wrong branch?"; exit 1; }
          set +e  # Don't exit on error - we want to capture the exit code
          python initial_import_v3.py --context ../league_context.json 2>&1 | tee ../import.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "========================================"
            echo "❌ IMPORT FAILED (exit code ${EXIT_CODE})"
            echo "========================================"
            echo ""

            echo "=== CONTEXT FILE ==="
            cat ../league_context.json || echo "Could not read context file"
            echo ""

            echo "=== DIRECTORY STRUCTURE ==="
            echo "Data directory contents:"
            ls -lR ../fantasy_football_data/ 2>/dev/null || echo "Data directory not found or empty"
            echo ""

            echo "=== LAST 300 LINES OF IMPORT LOG ==="
            tail -300 ../import.log
            echo ""

            echo "=== SEARCHING FOR PHASE 1 (FETCHERS) IN LOG ==="
            grep -A 50 "PHASE 1: Data Fetchers" ../import.log || echo "Phase 1 never started!"
            echo ""

            echo "=== SEARCHING FOR ERRORS IN LOG ==="
            grep -i "error\|exception\|traceback\|failed" ../import.log | head -50 || echo "No obvious errors found"

            exit $EXIT_CODE
          fi

          echo ""
          echo "✓ Import completed successfully"

      # ==================== CONSOLIDATE CANONICAL FILES ====================
      # DISABLED: The import script (initial_import_v3.py) already handles consolidation
      # in Phase 2.1, followed by staging merge (Phase 2.2) and transformations (Phase 3).
      # Running consolidation AFTER import overwrites the transformed files with raw data,
      # losing all the cumulative stats, LAMAR metrics, and other enrichments.
      - name: Consolidate canonical files (DISABLED)
        if: false  # Disabled - import script already handles this
        run: |
          echo "========================================"
          echo "Consolidating canonical parquet files"
          echo "========================================"

          python - <<'PYEOF'
          import sys
          from pathlib import Path

          # Add script directory to path
          sys.path.insert(0, 'fantasy_football_data_scripts')

          from multi_league.data_fetchers.shared.aggregators import (
              merge_matchups_to_parquet,
              normalize_draft_parquet,
              normalize_transactions_parquet,
              normalize_schedule_parquet,
          )

          context_path = "league_context.json"

          print("[CONSOLIDATE] Starting canonical file consolidation...")

          failed = []

          # Consolidate matchups
          try:
              print("[CONSOLIDATE] Creating matchup.parquet...")
              matchup_path = merge_matchups_to_parquet(context_path, years=None)
              print(f"  ✓ Created {matchup_path}")
          except Exception as e:
              print(f"  ✗ Failed to create matchup.parquet: {e}")
              import traceback
              traceback.print_exc()
              failed.append(("matchup", str(e)))

          # Consolidate draft
          try:
              print("[CONSOLIDATE] Creating draft.parquet...")
              draft_path = normalize_draft_parquet(context_path)
              print(f"  ✓ Created {draft_path}")
          except Exception as e:
              print(f"  ✗ Failed to create draft.parquet: {e}")
              import traceback
              traceback.print_exc()
              failed.append(("draft", str(e)))

          # Consolidate transactions
          try:
              print("[CONSOLIDATE] Creating transactions.parquet...")
              trans_path = normalize_transactions_parquet(context_path)
              print(f"  ✓ Created {trans_path}")
          except Exception as e:
              print(f"  ✗ Failed to create transactions.parquet: {e}")
              import traceback
              traceback.print_exc()
              failed.append(("transactions", str(e)))

          # Consolidate schedule
          try:
              print("[CONSOLIDATE] Creating schedule.parquet...")
              schedule_path = normalize_schedule_parquet(context_path)
              print(f"  ✓ Created {schedule_path}")
          except Exception as e:
              print(f"  ✗ Failed to create schedule.parquet: {e}")
              import traceback
              traceback.print_exc()
              failed.append(("schedule", str(e)))

          print("\n[CONSOLIDATE] Consolidation complete!")

          # Verify canonical files were created
          data_dir = Path("fantasy_football_data")
          canonical_files = ["matchup.parquet", "draft.parquet", "transactions.parquet", "schedule.parquet"]
          found = []
          missing = []

          for fname in canonical_files:
              fpath = data_dir / fname
              if fpath.exists():
                  found.append(fname)
              else:
                  missing.append(fname)

          print(f"\n[VERIFY] Found {len(found)} canonical files: {', '.join(found)}")
          if missing:
              print(f"[VERIFY] Missing {len(missing)} canonical files: {', '.join(missing)}")

          # Exit with error if consolidation failed
          if failed:
              print(f"\n[ERROR] Consolidation failed for {len(failed)} table(s):")
              for table, error in failed:
                  print(f"  - {table}: {error}")
              sys.exit(1)

          if missing:
              print(f"\n[ERROR] {len(missing)} canonical files were not created!")
              sys.exit(1)

          print("\n[SUCCESS] All canonical files created successfully!")
          PYEOF

      # ==================== VERIFY LOCAL DUCKDB ARTIFACTS ====================
      - name: Verify local DuckDB artifacts
        if: steps.import.outputs.exit_code == '0'
        id: verify
        env:
          DATA_DIR: fantasy_football_data
          DATABASE_NAME: ${{ steps.parse.outputs.database_name }}
        run: |
          source .venv/bin/activate
          PARQUET_COUNT=$(find "$DATA_DIR" -name "*.parquet" -type f | wc -l)
          LOCAL_DB="$DATA_DIR/${DATABASE_NAME}.duckdb"
          export PARQUET_COUNT LOCAL_DB

          echo "Observed ${PARQUET_COUNT} parquet files (informational only)"
          python - <<'PYEOF'
          import os
          import sys
          from pathlib import Path

          import duckdb

          db_path = Path(os.environ["LOCAL_DB"])
          required = ["league_settings", "matchup", "player_fantasy", "draft", "transactions", "schedule"]

          if not db_path.exists():
              print(f"ERROR: Local DuckDB not found: {db_path}")
              sys.exit(1)

          conn = duckdb.connect(str(db_path), read_only=True)
          existing = {
              row[0]
              for row in conn.execute(
                  "SELECT table_name FROM information_schema.tables WHERE table_schema = 'public'"
              ).fetchall()
          }
          missing = [table for table in required if table not in existing]

          print(f"Local DuckDB: {db_path}")
          if missing:
              print("ERROR: Missing canonical tables: " + ", ".join(missing))
              sys.exit(1)

          print("Canonical table row counts:")
          for table in required:
              count = conn.execute(f"SELECT COUNT(*) FROM public.{table}").fetchone()[0]
              print(f"  {table}: {count}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"local_db_path={db_path.as_posix()}\n")
              fh.write(f"table_count={len(required)}\n")
              fh.write(f"parquet_count={os.environ['PARQUET_COUNT']}\n")
          PYEOF

      # ==================== CONSOLIDATE LEAGUE SETTINGS ====================
      - name: Consolidate league settings
        if: steps.import.outputs.exit_code == '0'
        run: |
          python - <<'PYEOF'
          import json
          from pathlib import Path
          import pandas as pd

          settings_dir = Path("fantasy_football_data/league_settings")
          if not settings_dir.exists():
              print("No league_settings directory")
              exit(0)

          settings_files = list(settings_dir.glob("league_settings_*.json"))
          if not settings_files:
              print("No settings files found")
              exit(0)

          rows = []
          for sf in sorted(settings_files):
              try:
                  with open(sf, 'r', encoding='utf-8') as f:
                      data = json.load(f)
                  metadata = data.get('metadata', {})
                  rows.append({
                      'year': data.get('year'),
                      'league_key': data.get('league_key'),
                      'num_teams': metadata.get('num_teams'),
                      'num_playoff_teams': metadata.get('num_playoff_teams') or metadata.get('playoff_teams'),
                      'playoff_start_week': metadata.get('playoff_start_week'),
                      'bye_teams': metadata.get('bye_teams'),  # Critical for playoff bracket simulation
                      'has_multiweek_championship': metadata.get('has_multiweek_championship'),
                      'uses_playoff_reseeding': metadata.get('uses_playoff_reseeding'),
                      'current_week': metadata.get('current_week'),  # Current week of the season
                      'end_week': metadata.get('end_week'),  # Final week of the season
                      'is_finished': metadata.get('is_finished', False),  # Whether season is complete
                      'settings_json': json.dumps(data)
                  })
              except Exception as e:
                  print(f"Error reading {sf.name}: {e}")

          if rows:
              pd.DataFrame(rows).to_parquet("fantasy_football_data/league_settings.parquet", index=False)
              print(f"Created league_settings.parquet with {len(rows)} years")
          PYEOF

      # ==================== SAVE LEAGUE CONTEXT TO PARQUET ====================
      - name: Save league context to parquet
        if: steps.import.outputs.exit_code == '0'
        run: |
          python - <<'PYEOF'
          import json
          import pandas as pd
          from pathlib import Path
          from datetime import datetime

          with open("league_context.json") as f:
              context = json.load(f)

          now = datetime.now().isoformat()
          row = {
              'league_id': context.get('league_id'),
              'league_name': context.get('league_name'),
              'game_code': context.get('game_code', 'nfl'),
              'start_year': context.get('start_year'),
              'end_year': context.get('end_year'),
              'num_teams': context.get('num_teams'),
              'playoff_teams': context.get('playoff_teams'),
              'regular_season_weeks': context.get('regular_season_weeks'),
              'league_ids_json': json.dumps(context.get('league_ids', {})),
              'keeper_rules_json': json.dumps(context.get('keeper_rules')) if context.get('keeper_rules') else None,
              'manager_name_overrides_json': json.dumps(context.get('manager_name_overrides', {})),
              'created_at': context.get('created_at') or now,  # Use existing or set new
              'updated_at': now,  # Always update on import
          }

          pd.DataFrame([row]).to_parquet("fantasy_football_data/league_context.parquet", index=False)
          print("Saved league_context.parquet")
          PYEOF

      # ==================== VALIDATE CRITICAL TABLES ====================
      # Note: Upload, SQL enrichments, and aggregation are already handled by the import pipeline
      # (PHASE 4: Upload, PHASE 4.5: SQL Enrichments, PHASE 5: Aggregation)
      - name: Validate critical tables in MotherDuck
        if: steps.import.outputs.exit_code == '0'
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          DATABASE_NAME: ${{ steps.parse.outputs.database_name }}
        run: |
          echo "========================================"
          echo "Validating critical tables in MotherDuck"
          echo "========================================"

          python - <<'PYEOF'
          import duckdb
          import os
          import sys
          import re

          db_name = os.environ['DATABASE_NAME']
          token = os.environ['MOTHERDUCK_TOKEN']

          # Sanitize database name (same as _slug function in database.py)
          db = re.sub(r'[^a-zA-Z0-9]+', '_', db_name.strip().lower()).strip('_')
          if not db:
              db = 'db'
          if db[0].isdigit():
              db = 'l_' + db
          db = db[:63]

          # NOTE: 'player' replaced by 'player_fantasy' in two-track architecture
          # NFL stats come from super table (___ops.nfl_historical.nfl_player_stats_all) via JOIN
          CRITICAL_TABLES = ['league_settings', 'matchup', 'player_fantasy', 'schedule', 'draft', 'transactions']

          def fetch_count(table: str) -> tuple[bool, int]:
              for table_ref in (f"public.{table}", table):
                  try:
                      result = conn.execute(f"SELECT COUNT(*) FROM {table_ref}").fetchone()
                      return True, result[0] if result else 0
                  except Exception:
                      continue
              return False, 0

          def fetch_years(table: str) -> list[int]:
              for table_ref in (f"public.{table}", table):
                  try:
                      rows = conn.execute(
                          f"SELECT DISTINCT year FROM {table_ref} WHERE year IS NOT NULL ORDER BY year"
                      ).fetchall()
                      return [int(row[0]) for row in rows if row and row[0] is not None]
                  except Exception:
                      continue
              return []

          def fetch_regular_season_week_gaps() -> list[tuple[int, int, int, int]]:
              try:
                  return conn.execute("""
                      WITH settings AS (
                          SELECT
                              year,
                              CAST(num_teams AS INTEGER) AS num_teams,
                              CAST(COALESCE(playoff_start_week - 1, end_week) AS INTEGER) AS regular_weeks
                          FROM public.league_settings
                          WHERE year IS NOT NULL
                            AND num_teams IS NOT NULL
                            AND COALESCE(playoff_start_week - 1, end_week) IS NOT NULL
                      ),
                      expected AS (
                          SELECT s.year, gs.generate_series AS week, s.num_teams
                          FROM settings s, generate_series(1, s.regular_weeks) gs
                      ),
                      actual AS (
                          SELECT
                              year,
                              week,
                              COUNT(DISTINCT COALESCE(NULLIF(franchise_id, ''), manager)) AS manager_count
                          FROM public.matchup
                          WHERE manager IS NOT NULL
                            AND TRIM(manager) != ''
                          GROUP BY 1, 2
                      )
                      SELECT
                          e.year,
                          e.week,
                          e.num_teams,
                          COALESCE(a.manager_count, 0) AS manager_count
                      FROM expected e
                      LEFT JOIN actual a
                        ON a.year = e.year AND a.week = e.week
                      WHERE COALESCE(a.manager_count, 0) <> e.num_teams
                      ORDER BY e.year, e.week
                  """).fetchall()
              except Exception:
                  return []

          def fetch_player_coverage_gaps() -> list[tuple[int, int, str, str]]:
              try:
                  return conn.execute("""
                      WITH settings AS (
                          SELECT
                              year,
                              CAST(COALESCE(playoff_start_week - 1, end_week) AS INTEGER) AS regular_weeks
                          FROM public.league_settings
                          WHERE year IS NOT NULL
                            AND COALESCE(playoff_start_week - 1, end_week) IS NOT NULL
                      ),
                      matchup_managers AS (
                          SELECT DISTINCT
                              m.year,
                              m.week,
                              COALESCE(NULLIF(m.franchise_id, ''), m.manager) AS manager_key,
                              m.manager
                          FROM public.matchup m
                          JOIN settings s
                            ON s.year = m.year
                          WHERE m.week <= s.regular_weeks
                            AND m.manager IS NOT NULL
                            AND TRIM(m.manager) != ''
                      ),
                      roster_managers AS (
                          SELECT DISTINCT
                              p.year,
                              p.week,
                              COALESCE(NULLIF(p.franchise_id, ''), p.manager) AS manager_key
                          FROM public.player_fantasy p
                          WHERE p.manager IS NOT NULL
                            AND TRIM(p.manager) != ''
                      )
                      SELECT
                          mm.year,
                          mm.week,
                          mm.manager_key,
                          mm.manager
                      FROM matchup_managers mm
                      LEFT JOIN roster_managers rm
                        ON rm.year = mm.year
                       AND rm.week = mm.week
                       AND rm.manager_key = mm.manager_key
                      WHERE rm.manager_key IS NULL
                      ORDER BY mm.year, mm.week, mm.manager
                  """).fetchall()
              except Exception:
                  return []

          print(f"Connecting to database: {db}")
          conn = duckdb.connect(f'md:{db}?motherduck_token={token}')

          failed = []
          for table in CRITICAL_TABLES:
              found, count = fetch_count(table)

              if not found:
                  print(f"  ✗ {table}: MISSING")
                  failed.append(f"{table} (missing)")
              elif count == 0:
                  print(f"  ✗ {table}: EXISTS but EMPTY (0 rows)")
                  failed.append(f"{table} (empty)")
              else:
                  print(f"  ✓ {table}: {count:,} rows")

          expected_years = fetch_years("league_settings")
          if expected_years:
              print(f"Expected years from league_settings: {expected_years}")
              for table in ["matchup", "player_fantasy", "schedule", "draft", "transactions"]:
                  actual_years = fetch_years(table)
                  missing_years = sorted(set(expected_years) - set(actual_years))
                  if missing_years:
                      print(f"  ✗ {table}: missing year coverage for {missing_years}")
                      failed.append(f"{table} missing years {missing_years}")
                  else:
                      print(f"  ✓ {table}: year coverage OK")
              matchup_week_gaps = fetch_regular_season_week_gaps()
              if matchup_week_gaps:
                  preview = ", ".join(
                      f"{year}-W{week} ({actual}/{expected})"
                      for year, week, expected, actual in matchup_week_gaps[:10]
                  )
                  print(f"  X matchup: regular-season week coverage gaps -> {preview}")
                  if len(matchup_week_gaps) > 10:
                      print(f"    ... plus {len(matchup_week_gaps) - 10} more gap(s)")
                  failed.append(f"matchup missing manager-weeks in {len(matchup_week_gaps)} regular-season week(s)")
              else:
                  print("  OK matchup: regular-season weekly manager coverage OK")

              player_coverage_gaps = fetch_player_coverage_gaps()
              if player_coverage_gaps:
                  preview = ", ".join(
                      f"{year}-W{week} {manager}"
                      for year, week, _, manager in player_coverage_gaps[:10]
                  )
                  print(f"  X player_fantasy: missing matchup managers -> {preview}")
                  if len(player_coverage_gaps) > 10:
                      print(f"    ... plus {len(player_coverage_gaps) - 10} more gap(s)")
                  failed.append(f"player_fantasy missing {len(player_coverage_gaps)} matchup manager-week roster(s)")
              else:
                  print("  OK player_fantasy: matchup manager-weeks covered in regular season")
          else:
              failed.append("league_settings has no year rows")

          # Check for Unknown managers in transactions after SQL enrichments.
          unknown_warnings = []
          try:
              rows = conn.execute("""
                  SELECT
                      year,
                      COUNT(*) AS unknown_count,
                      SUM(
                          CASE
                              WHEN COALESCE(LOWER(TRIM(transaction_type)), '') != 'drop' THEN 1
                              ELSE 0
                          END
                      ) AS blocking_unknown_count
                  FROM public.transactions
                  WHERE manager IS NULL OR TRIM(manager) = '' OR LOWER(TRIM(manager)) = 'unknown'
                  GROUP BY year
                  ORDER BY year
              """).fetchall()
              if rows:
                  blocking_years = []
                  for year, count, blocking_count in rows:
                      if blocking_count and int(blocking_count) > 0:
                          blocking_years.append(f"year={year}: {count} rows ({blocking_count} non-drop)")
                          print(
                              f"  X transactions has {count} Unknown/NULL manager rows in {year} "
                              f"({blocking_count} outside drop-only cases)"
                          )
                      else:
                          unknown_warnings.append(f"year={year}: {count} drop-only rows")
                          print(
                              f"  ! WARNING: transactions has {count} Unknown/NULL manager rows in {year} "
                              f"(drop-only; logged but not blocking)"
                          )
                  if blocking_years:
                      failed.append("transactions have blocking Unknown/NULL managers: " + "; ".join(blocking_years))
              else:
                  print("  ✓ No Unknown managers in transactions")
          except Exception as e:
              print(f"  ⚠ Could not check Unknown managers: {e}")
              failed.append(f"transactions Unknown-manager check failed: {e}")

          conn.close()

          # Write Phase 1.9 result for workflow summary
          with open("phase19_result.txt", "w") as f:
              if failed:
                  f.write("ERROR: " + "; ".join(failed))
              elif unknown_warnings:
                  f.write("WARNING: " + "; ".join(unknown_warnings))
              else:
                  f.write("OK")

          if failed:
              print(f"\n❌ VALIDATION FAILED: Critical tables missing or empty: {', '.join(failed)}")
              sys.exit(1)
          else:
              print(f"\n✓ All {len(CRITICAL_TABLES)} critical tables validated successfully")
          PYEOF

      # ==================== CLEANUP DEPRECATED COLUMNS ====================
      - name: Cleanup deprecated columns
        if: steps.import.outputs.exit_code == '0'
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          DATABASE_NAME: ${{ steps.parse.outputs.database_name }}
        run: |
          source .venv/bin/activate
          echo "Cleaning up deprecated columns..."
          python -c "import os; import sys; sys.path.insert(0, '.'); from streamlit_helpers.database import drop_deprecated_columns; db=os.environ.get('DATABASE_NAME',''); tok=os.environ.get('MOTHERDUCK_TOKEN',''); dropped=drop_deprecated_columns(db,tok,dry_run=False) if db and tok else []; print(f'Dropped {len(dropped)} deprecated columns') if dropped else print('No deprecated columns to drop')"

      # ==================== CLEANUP STAGING DATA ====================
      # Always cleanup staging after full import completes successfully
      - name: Cleanup staging data
        if: steps.import.outputs.exit_code == '0'
        uses: ./.github/actions/cleanup-staging
        with:
          database_name: ${{ steps.parse.outputs.database_name }}
          motherduck_token: ${{ secrets.MOTHERDUCK_TOKEN }}
          has_external_data: 'true'

      # ==================== STORE CREDENTIALS ====================
      # Always store credentials, even if import fails — they're needed for
      # future re-imports and weekly updates. store_league_credentials uses
      # INSERT OR REPLACE so re-runs are idempotent.
      - name: Store credentials for weekly updates
        if: always()
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
          DATABASE_NAME: ${{ steps.parse.outputs.database_name }}
          LEAGUE_ID: ${{ steps.parse.outputs.league_id }}
          LEAGUE_NAME: ${{ steps.parse.outputs.league_name }}
        run: |
          if [ -z "$CREDENTIAL_ENCRYPTION_KEY" ]; then
            echo "CREDENTIAL_ENCRYPTION_KEY not set - weekly updates will require manual auth"
            exit 0
          fi

          python - <<'PYEOF'
          import json
          import sys
          sys.path.insert(0, 'fantasy_football_data_scripts')

          from multi_league.utils.credential_store import store_league_credentials
          import os

          with open("oauth/Oauth.json", 'r') as f:
              oauth_data = json.load(f)

          refresh_token = oauth_data.get('refresh_token')
          if not refresh_token:
              print("No refresh_token - weekly updates may not work")
              exit(0)

          success = store_league_credentials(
              database_name=os.environ['DATABASE_NAME'],
              refresh_token=refresh_token,
              league_id=os.environ['LEAGUE_ID'],
              league_name=os.environ['LEAGUE_NAME']
          )

          if success:
              print(f"Credentials stored - weekly updates enabled")
          PYEOF

      # ==================== CREATE DEPLOYMENT MANIFEST ====================
      - name: Create deployment manifest
        if: steps.import.outputs.exit_code == '0'
        run: |
          python - <<'PYEOF'
          import json
          import os

          manifest = {
              "user_id": "${{ steps.parse.outputs.user_id }}",
              "league_name": "${{ steps.parse.outputs.league_name }}",
              "league_id": "${{ steps.parse.outputs.league_id }}",
              "season": "${{ steps.parse.outputs.season }}",
              "motherduck_database": "${{ steps.parse.outputs.database_name }}",
              "local_duckdb_path": "${{ steps.verify.outputs.local_db_path }}",
              "verified_table_count": ${{ steps.verify.outputs.table_count }},
              "import_mode": "${{ steps.parse.outputs.import_mode }}",
              "created_at": os.popen('date -Iseconds').read().strip(),
              "workflow_run_id": "${{ github.run_id }}",
              "status": "ready"
          }

          with open("deployment_manifest.json", 'w') as f:
              json.dump(manifest, f, indent=2)

          print(json.dumps(manifest, indent=2))
          PYEOF

      # ==================== CLEANUP ON FAILURE ====================
      # NOTE: We intentionally do not cleanup staging data on failure
      # The user may want to retry the import and needs their uploaded data preserved
      # Staging cleanup only happens after successful FULL imports

      # ==================== UPDATE JOB STATUS - FINAL ====================

      # ==================== UPLOAD ARTIFACTS ====================
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: league-import-${{ steps.parse.outputs.user_id }}
          path: |
            import.log
            motherduck.log
          retention-days: 30

      # ==================== WORKFLOW SUMMARY ====================
      - name: Create workflow summary
        if: always()
        run: |
          echo "# League Import Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## League Information" >> $GITHUB_STEP_SUMMARY
          echo "- **League**: ${{ steps.parse.outputs.league_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Season**: ${{ steps.parse.outputs.season }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Import Mode**: ${{ steps.parse.outputs.import_mode }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Years**: ${{ steps.parse.outputs.start_year }}-${{ steps.parse.outputs.season }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Database**: \`${{ steps.parse.outputs.database_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.import.outputs.exit_code }}" == "0" ]; then
            echo "## Status: SUCCESS" >> $GITHUB_STEP_SUMMARY
            echo "- Local DuckDB: \`${{ steps.verify.outputs.local_db_path }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- Canonical tables verified: ${{ steps.verify.outputs.table_count }}" >> $GITHUB_STEP_SUMMARY
            echo "- Import completed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Status: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "Check the logs for details" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Post-Fetch Validation (Phase 1.9)" >> $GITHUB_STEP_SUMMARY
          if [ -f "phase19_result.txt" ]; then
            PHASE19=$(cat phase19_result.txt)
            if [[ "$PHASE19" == "OK" ]]; then
              echo "- Transaction manager resolution: OK" >> $GITHUB_STEP_SUMMARY
            else
              echo "- Transaction manager resolution: $PHASE19" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- Phase 1.9 check did not run" >> $GITHUB_STEP_SUMMARY
          fi

      # ==================== COMPUTE HOMEPAGE SUMMARY ====================
      # Precompute all homepage data for 10-15x faster page loads
      # Non-fatal: homepage errors must not block downstream workflows (playoff sims, etc.)
      - name: Compute homepage summary
        if: steps.import.outputs.exit_code == '0' && env.IMPORT_PIPELINE_V2 != 'true'
        continue-on-error: true
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          source .venv/bin/activate
          echo "Computing precomputed homepage summary tables..."
          python fantasy_football_data_scripts/multi_league/transformations/aggregation/homepage_summary.py \
            --context league_context.json --upload || {
            exit_code=$?
            if [ "$exit_code" -eq 139 ]; then
              echo "⚠️ DuckDB segfault on shutdown (exit 139) — data already uploaded, ignoring"
            else
              echo "⚠️ Homepage summary failed (exit $exit_code) — continuing to downstream workflows"
            fi
          }
          echo "Homepage summary complete!"

      # ==================== TRIGGER DOWNSTREAM WORKFLOWS ====================
      - name: Trigger downstream workflows
        if: steps.import.outputs.exit_code == '0'
        uses: ./.github/actions/trigger-downstream
        with:
          database_name: ${{ steps.parse.outputs.database_name }}
          user_id: ${{ steps.parse.outputs.user_id }}
          import_mode: ${{ steps.parse.outputs.import_mode }}
          season: ${{ steps.parse.outputs.season }}
          actual_start_year: ${{ steps.parse.outputs.actual_start_year }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          n_sims: '10000'
