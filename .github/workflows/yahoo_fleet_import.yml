name: Yahoo Fleet Import

# Imports multiple Yahoo leagues in parallel using matrix strategy.
# Each league runs as its own independent job so failures are isolated.
#
# Usage:
#   Manual: set source=test for QA leagues, or source=custom with leagues_json
#   Or: set source=motherduck to auto-discover from ___ops via Fly.io
#
# Yahoo-specific: each league needs OAuth credentials (encrypted refresh token
# stored in ___ops.main.league_credentials). The importer uses --league flag
# which pulls credentials via Fly.io automatically.

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'League source: "test" (6 QA leagues), "motherduck" (all yahoo leagues), or "custom" (provide leagues_json)'
        required: true
        type: choice
        options:
          - test
          - motherduck
          - custom
        default: test
      leagues_json:
        description: 'JSON array of leagues (only used when source=custom). Format: [{"database_name":"the_league", "import_mode":"full"}]'
        required: false
        type: string
      max_parallel:
        description: 'Max parallel imports (GitHub free = 20 concurrent jobs)'
        required: false
        type: number
        default: 3
      batch:
        description: 'Batch number for motherduck source (1=first 250, 2=remaining). Ignored for test/custom.'
        required: false
        type: number
        default: 1
      exclude_dbs:
        description: 'Comma-separated database names to skip (e.g. already reimported)'
        required: false
        type: string
      dry_run:
        description: 'Dry run - discover leagues but skip import'
        required: false
        type: boolean
        default: false

permissions:
  actions: write
  contents: read

jobs:
  # ================================================================
  # Job 1: Discover leagues and build the matrix
  # ================================================================
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      league_count: ${{ steps.build.outputs.league_count }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          repository: jeleff1000/yahoo_oauth
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build league matrix
        id: build
        env:
          DATABASE_SERVER_URL: ${{ secrets.DATABASE_SERVER_URL }}
          DATABASE_READ_TOKEN: ${{ secrets.DATABASE_READ_TOKEN }}
          SOURCE: ${{ github.event.inputs.source }}
          LEAGUES_JSON: ${{ github.event.inputs.leagues_json }}
          BATCH: ${{ github.event.inputs.batch || '1' }}
          EXCLUDE_DBS: ${{ github.event.inputs.exclude_dbs || '' }}
        run: |
          python - <<'PYEOF'
          import json, os, sys, urllib.request

          def fly_query(sql, database="___ops"):
              url = os.environ["DATABASE_SERVER_URL"].rstrip("/") + "/query"
              token = os.environ["DATABASE_READ_TOKEN"]
              data = json.dumps({"sql": sql, "database": database}).encode()
              req = urllib.request.Request(url, data=data, headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {token}",
              })
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.loads(resp.read())

          source = os.environ.get("SOURCE", "test")
          leagues_json_raw = os.environ.get("LEAGUES_JSON", "")

          # Never touch these databases in fleet imports
          ALWAYS_EXCLUDE = {"kmffl", "demo_league"}

          # Leagues registered after this date get quick import (already have data)
          # Leagues before get full (need reimport with pipeline fixes)
          CUTOFF = "2026-03-22"
          # Exception: always full import for these
          ALWAYS_FULL = {"yk_jff_vilde_hatzooleh_league"}

          if source == "custom" and leagues_json_raw:
              leagues = json.loads(leagues_json_raw)

          elif source == "test":
              # Yahoo test leagues — mix of depths and features
              leagues = [
                  {"database_name": "the_league", "import_mode": "full"},
                  {"database_name": "l_5_towns_football", "import_mode": "full"},
                  {"database_name": "you_are_a_pirate", "import_mode": "full"},
                  {"database_name": "keeper_league", "import_mode": "full"},
                  {"database_name": "the_league_year_xiii", "import_mode": "full"},
                  {"database_name": "yk_jff_vilde_hatzooleh_league", "import_mode": "full"},
              ]

          elif source == "motherduck":
              from datetime import datetime

              raw_rows = fly_query("""
                  SELECT league_id, league_name, database_name, updated_at
                  FROM main.league_credentials
                  ORDER BY database_name
              """)
              rows = [(r["league_id"], r["league_name"], r["database_name"], r["updated_at"]) for r in raw_rows]

              cutoff_dt = datetime.fromisoformat(CUTOFF)

              # Deduplicate by database_name, assign import mode by registration date
              db_map = {}
              for lid, name, db, updated_at in rows:
                  if db in ALWAYS_EXCLUDE:
                      continue
                  if db not in db_map:
                      if db in ALWAYS_FULL:
                          mode = "full"
                      elif updated_at and datetime.fromisoformat(str(updated_at)) > cutoff_dt:
                          mode = "quick"
                      else:
                          mode = "full"
                      db_map[db] = {"database_name": db, "import_mode": mode}

              all_leagues = sorted(db_map.values(), key=lambda x: x["database_name"])

              # Exclude specific databases (user-provided + always-exclude)
              exclude = ALWAYS_EXCLUDE | set(x.strip() for x in os.environ.get("EXCLUDE_DBS", "").split(",") if x.strip())
              all_leagues = [v for v in all_leagues if v["database_name"] not in exclude]
              if exclude - ALWAYS_EXCLUDE:
                  print(f"Excluding {len(exclude - ALWAYS_EXCLUDE)} user databases: {exclude - ALWAYS_EXCLUDE}")

              # Batch: split into chunks of 250 (GH Actions matrix limit = 256)
              batch = int(os.environ.get("BATCH", "1"))
              batch_size = 250
              start = (batch - 1) * batch_size
              end = start + batch_size
              batched = all_leagues[start:end]
              print(f"Batch {batch}: leagues {start+1}-{min(end, len(all_leagues))} of {len(all_leagues)}")

              leagues = batched
          else:
              print(f"ERROR: Unknown source '{source}'")
              sys.exit(1)

          # Remove always-excluded from any source
          leagues = [lg for lg in leagues if lg["database_name"] not in ALWAYS_EXCLUDE]

          # Validate
          for lg in leagues:
              assert lg.get("database_name"), f"Missing database_name: {lg}"
              if "import_mode" not in lg:
                  lg["import_mode"] = "full"

          matrix = {"include": leagues}

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
              f.write(f"league_count={len(leagues)}\n")

          print(f"Discovered {len(leagues)} leagues:")
          for lg in leagues:
              print(f"  {lg['database_name']} (mode={lg['import_mode']})")
          PYEOF

  # ================================================================
  # Job 1.1: Scale up Fly server for fleet import
  # ================================================================
  scale-up:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Scale Fly to 8GB RAM
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          curl -sL https://fly.io/install.sh | sh
          export PATH="$HOME/.fly/bin:$PATH"
          flyctl scale memory 8192 -a league-history-duckdb
          echo "Scaled to 8GB for fleet import"

  # ================================================================
  # Job 1.5: Build or restore ___ops cache
  # ================================================================
  build-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          repository: jeleff1000/yahoo_oauth
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Restore ops cache
        id: cache
        uses: actions/cache@v5
        with:
          path: ops_cache
          key: ops-cache-v1-${{ hashFiles('fantasy_football_data_scripts/build_ops_cache.py') }}
          restore-keys: ops-cache-v1-

      - name: Build ops cache (on miss)
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          DATABASE_SERVER_URL: ${{ secrets.DATABASE_SERVER_URL }}
          DATABASE_READ_TOKEN: ${{ secrets.DATABASE_READ_TOKEN }}
        run: |
          pip install duckdb==1.5.1
          python fantasy_football_data_scripts/build_ops_cache.py \
            --output ops_cache/ops_cache.duckdb

  # ================================================================
  # Job 2: Import each league in parallel (matrix)
  # ================================================================
  import-league:
    needs: [discover, build-cache, scale-up]
    if: ${{ !inputs.dry_run && fromJson(needs.discover.outputs.league_count) > 0 }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
      max-parallel: ${{ fromJson(github.event.inputs.max_parallel || '3') }}
      fail-fast: false  # Don't cancel other leagues if one fails

    env:
      PYTHONUNBUFFERED: 1
      DB_NAME: ${{ matrix.database_name }}
      IMPORT_MODE: ${{ matrix.import_mode }}
      CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
      YAHOO_CLIENT_ID: ${{ secrets.YAHOO_CLIENT_ID }}
      YAHOO_CLIENT_SECRET: ${{ secrets.YAHOO_CLIENT_SECRET }}
      OPS_CACHE_PATH: ${{ github.workspace }}/ops_cache/ops_cache.duckdb
      DATABASE_BACKEND: fly
      DATABASE_SERVER_URL: ${{ secrets.DATABASE_SERVER_URL }}
      DATABASE_READ_TOKEN: ${{ secrets.DATABASE_READ_TOKEN }}
      DATABASE_ADMIN_TOKEN: ${{ secrets.DATABASE_ADMIN_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          repository: jeleff1000/yahoo_oauth
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Restore ops cache
        uses: actions/cache@v5
        with:
          path: ops_cache
          key: ops-cache-v1-${{ hashFiles('fantasy_football_data_scripts/build_ops_cache.py') }}
          restore-keys: ops-cache-v1-

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache Python virtualenv
        uses: actions/cache@v5
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('requirements.txt') }}

      - name: Create virtualenv
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Activate venv
        run: echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      # ==================== IMPORT ====================
      - name: Run import
        id: import
        working-directory: fantasy_football_data_scripts
        run: |
          source ../.venv/bin/activate
          echo "========================================"
          echo "Importing: ${{ env.DB_NAME }}"
          echo "Import mode: ${{ env.IMPORT_MODE }}"
          echo "========================================"

          DATA_DIR="${{ github.workspace }}/fantasy_football_data/yahoo_${{ env.DB_NAME }}"
          mkdir -p "$DATA_DIR"

          # Build import flags
          IMPORT_FLAGS="--league ${{ env.DB_NAME }} --data-dir $DATA_DIR"
          if [ "${{ env.IMPORT_MODE }}" = "quick" ]; then
            IMPORT_FLAGS="$IMPORT_FLAGS --quick"
          fi
          IMPORT_FLAGS="$IMPORT_FLAGS --skip-track-2-upload"

          set +e
          python initial_import_v3.py $IMPORT_FLAGS \
            2>&1 | tee ../import_${{ env.DB_NAME }}.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT
          echo "data_dir=${DATA_DIR}" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -ne 0 ]; then
            echo "IMPORT FAILED for ${{ env.DB_NAME }} (exit code ${EXIT_CODE})"
            tail -100 ../import_${{ env.DB_NAME }}.log
            exit $EXIT_CODE
          fi

      # ==================== SIMS ====================
      - name: Calculate expected records
        if: steps.import.outputs.exit_code == '0'
        run: |
          cd fantasy_football_data_scripts
          python -m multi_league.transformations.matchup.expected_record_v2 \
            --db ${{ env.DB_NAME }} \
            --data-dir ${{ steps.import.outputs.data_dir }} \
            --n-sims 10000

      - name: Calculate playoff odds
        if: steps.import.outputs.exit_code == '0'
        run: |
          cd fantasy_football_data_scripts
          python -m multi_league.transformations.matchup.playoff_odds_import \
            --db ${{ env.DB_NAME }} \
            --data-dir ${{ steps.import.outputs.data_dir }} \
            --n-sims 10000

      # Populates keeper_year (consecutive years a player was kept by the same
      # franchise) in player_fantasy. The live fleet importer bypasses
      # LeagueSession, so this must be an explicit workflow step.
      - name: Calculate keeper economics
        if: steps.import.outputs.exit_code == '0'
        run: |
          cd fantasy_football_data_scripts
          python -m multi_league.transformations.player.keeper_economics \
            --db ${{ env.DB_NAME }} \
            --data-dir ${{ steps.import.outputs.data_dir }}

      # ==================== AGGREGATIONS ====================
      - name: Run aggregations
        if: steps.import.outputs.exit_code == '0'
        run: |
          cd fantasy_football_data_scripts
          python ../scripts/refresh_aggregates.py \
            --db ${{ env.DB_NAME }} \
            --data-dir ${{ steps.import.outputs.data_dir }}

      # ==================== UPLOAD ====================
      - name: Upload to database
        if: steps.import.outputs.exit_code == '0'
        run: |
          cd fantasy_football_data_scripts
          python -c "
          from multi_league.core.local_db import LocalLeagueDB
          db = LocalLeagueDB('${{ steps.import.outputs.data_dir }}', '${{ env.DB_NAME }}')
          db.connect()
          db.upload_to_fly('${{ env.DB_NAME }}')
          print('Upload to Fly complete: ${{ env.DB_NAME }}')
          db.close()
          "

      # ==================== STATUS ====================
      - name: Print status
        if: always()
        run: |
          echo "========================================"
          echo "RESULT: ${{ env.DB_NAME }}"
          echo "Import: ${{ steps.import.outputs.exit_code == '0' && 'SUCCESS' || 'FAILED' }}"
          echo "========================================"

  # ================================================================
  # Job 3: Summary
  # ================================================================
  summary:
    needs: [discover, import-league]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fleet summary
        run: |
          echo "========================================"
          echo "YAHOO FLEET IMPORT COMPLETE"
          echo "========================================"
          echo "Leagues attempted: ${{ needs.discover.outputs.league_count }}"

  # ================================================================
  # Job 4: Scale down Fly server after fleet import
  # ================================================================
  scale-down:
    needs: [import-league]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Scale Fly back to 4GB RAM
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          curl -sL https://fly.io/install.sh | sh
          export PATH="$HOME/.fly/bin:$PATH"
          flyctl scale memory 4096 -a league-history-duckdb
          echo "Scaled back to 4GB after fleet import"
