name: ESPN Quick Import Worker (Current Year Only)

# Free ESPN import: fetches current year, runs sims + aggregations locally,
# uploads to Fly.io once at the end. Self-contained — no trigger-downstream.
# Called from: Next.js frontend via repository_dispatch

on:
  workflow_dispatch:
    inputs:
      league_data_b64:
        description: 'Base64-encoded JSON with ESPN league configuration'
        required: false
        type: string
      user_id:
        description: 'Unique identifier for this user/import job'
        required: true
        type: string
      yahoo_oauth_ref:
        description: 'yahoo_oauth branch/ref to check out (workers-repo override; default main)'
        required: false
        type: string
        default: 'main'

  repository_dispatch:
    types: [espn_quick_import]

# Prevent multiple imports for the same user running simultaneously
concurrency:
  group: espn-import-${{ github.event.inputs.user_id || github.event.client_payload.user_id }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: read

jobs:
  import-espn-league:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      PYTHONUNBUFFERED: 1
      DATABASE_BACKEND: fly
      DATABASE_SERVER_URL: ${{ secrets.DATABASE_SERVER_URL }}
      DATABASE_READ_TOKEN: ${{ secrets.DATABASE_READ_TOKEN }}
      DATABASE_ADMIN_TOKEN: ${{ secrets.DATABASE_ADMIN_TOKEN }}
      OPS_CACHE_PATH: ${{ github.workspace }}/ops_cache/ops_cache.duckdb

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          repository: jeleff1000/yahoo_oauth
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.inputs.yahoo_oauth_ref || github.event.client_payload.yahoo_oauth_ref || 'main' }}

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Restore ops cache
        id: ops-cache
        uses: actions/cache@v5
        with:
          path: ops_cache
          key: ops-cache-v1-${{ hashFiles('fantasy_football_data_scripts/build_ops_cache.py') }}
          restore-keys: ops-cache-v1-

      - name: Build ops cache (on miss)
        if: steps.ops-cache.outputs.cache-hit != 'true'
        env:
          DATABASE_SERVER_URL: ${{ secrets.DATABASE_SERVER_URL }}
          DATABASE_READ_TOKEN: ${{ secrets.DATABASE_READ_TOKEN }}
        run: |
          pip install duckdb==1.5.1
          python fantasy_football_data_scripts/build_ops_cache.py \
            --output ops_cache/ops_cache.duckdb

      - name: Cache Python virtualenv
        uses: actions/cache@v5
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('requirements.txt') }}


      - name: Create virtualenv
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Activate venv
        run: |
          echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      # ==================== PARSE INPUT ====================
      - name: Parse league data
        id: parse
        run: |
          source .venv/bin/activate
          python - <<'PYEOF'
          import json
          import os
          import base64
          import re

          # Get input from either workflow_dispatch or repository_dispatch
          league_data_b64 = os.environ.get('LEAGUE_DATA_B64', '')
          user_id = os.environ.get('USER_ID', '')
          # Decode base64 if provided
          if league_data_b64:
              try:
                  league_data = json.loads(base64.b64decode(league_data_b64).decode('utf-8'))
              except:
                  league_data = json.loads(league_data_b64)
          else:
              print("ERROR: No league data provided")
              exit(1)

          # import_mode from payload: "quick" (free) or "quick_to_full" (paid)
          import_mode = league_data.get('import_mode', 'quick')

          # Extract ESPN-specific fields
          espn_league_id = league_data.get('espn_league_id') or league_data.get('league_id')
          league_name = league_data.get('league_name', 'ESPN League')
          espn_s2 = league_data.get('espn_s2', '')
          swid = league_data.get('swid', '')
          start_year = int(league_data.get('start_year', 2024))
          end_year = int(league_data.get('end_year') or league_data.get('season', 2025))
          # Combined league support: year -> league_id mapping
          league_ids = league_data.get('league_ids', {})

          # Validate required fields
          if not espn_league_id:
              print("ERROR: espn_league_id (or league_id) is required")
              exit(1)

          # Resolve database name using shared resolver
          import subprocess
          pre_computed_db = league_data.get('database_name', '').strip()
          result = subprocess.run(
              ['python', '.github/scripts/resolve_db_name.py',
               '--league-id', str(espn_league_id),
               '--league-name', league_name,
               '--platform', 'espn',
               '--database-name', pre_computed_db],
              capture_output=True, text=True
          )
          if result.returncode != 0:
              print(f"WARNING: resolve_db_name.py failed: {result.stderr}")
              db_name = re.sub(r'[^a-zA-Z0-9]+', '_', league_name.strip().lower()).strip('_') or 'espn_league'
              if db_name[0].isdigit():
                  db_name = 'l_' + db_name
              db_name = db_name[:63]
          else:
              db_name = result.stdout.strip().split('\n')[-1]
          print(f"Using database name: {db_name}")

          # Save parsed data for next steps
          with open("league_data_input.json", 'w') as f:
              json.dump(league_data, f, indent=2)

          # Output for GitHub Actions
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"espn_league_id={espn_league_id}\n")
              f.write(f"league_name={league_name}\n")
              f.write(f"database_name={db_name}\n")
              f.write(f"user_id={user_id}\n")
              f.write(f"import_mode={import_mode}\n")
              f.write(f"start_year={start_year}\n")
              f.write(f"end_year={end_year}\n")

          # Save ESPN cookies to files (avoid exposing in env vars/logs)
          with open(".espn_s2", 'w') as f:
              f.write(espn_s2)
          with open(".espn_swid", 'w') as f:
              f.write(swid)

          print(f"Parsed ESPN league: {league_name}")
          print(f"  League ID: {espn_league_id}")
          print(f"  Years: {start_year}-{end_year}")
          print(f"  Database: {db_name}")
          print(f"  Import mode: {import_mode}")
          print(f"  Has espn_s2: {'yes' if espn_s2 else 'no'}")
          print(f"  Has SWID: {'yes' if swid else 'no'}")
          PYEOF
        env:
          LEAGUE_DATA_B64: ${{ github.event.inputs.league_data_b64 || github.event.client_payload.league_data_b64 }}
          USER_ID: ${{ github.event.inputs.user_id || github.event.client_payload.user_id }}

      # ==================== RETRIEVE STORED COOKIES (if not in payload) ====================
      - name: Retrieve ESPN cookies
        if: steps.parse.outputs.database_name != ''
        env:
          CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
          DATABASE_SERVER_URL: ${{ secrets.DATABASE_SERVER_URL }}
          DATABASE_READ_TOKEN: ${{ secrets.DATABASE_READ_TOKEN }}
        run: |
          # Check if cookies were provided in the payload
          if [ -s .espn_s2 ] && [ "$(cat .espn_s2 | tr -d '[:space:]')" != "" ]; then
            echo "ESPN cookies provided in payload — skipping lookup"
            exit 0
          fi

          echo "No ESPN cookies in payload — retrieving from Fly..."
          python - <<'PYEOF'
          import json, os, sys, urllib.request
          from cryptography.fernet import Fernet

          db_name = "${{ steps.parse.outputs.database_name }}"
          enc_key = os.environ.get('CREDENTIAL_ENCRYPTION_KEY', '')
          if not enc_key:
              print("WARNING: CREDENTIAL_ENCRYPTION_KEY not set")
              sys.exit(0)

          def fly_query(sql, database="___ops"):
              url = os.environ["DATABASE_SERVER_URL"].rstrip("/") + "/query"
              token = os.environ["DATABASE_READ_TOKEN"]
              data = json.dumps({"sql": sql, "database": database}).encode()
              req = urllib.request.Request(url, data=data, headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {token}",
              })
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.loads(resp.read())

          safe_db = db_name.replace("'", "''")
          rows = fly_query(f"SELECT encrypted_espn_s2, encrypted_swid FROM main.espn_leagues WHERE database_name = '{safe_db}'")

          if not rows or not rows[0].get('encrypted_espn_s2'):
              print(f"No stored cookies for {db_name}")
              sys.exit(0)

          f = Fernet(enc_key.encode())
          espn_s2 = f.decrypt(rows[0]['encrypted_espn_s2'].encode()).decode()
          swid = f.decrypt(rows[0]['encrypted_swid'].encode()).decode()

          with open(".espn_s2", "w") as fh: fh.write(espn_s2)
          with open(".espn_swid", "w") as fh: fh.write(swid)
          print(f"Retrieved ESPN cookies for {db_name}")
          PYEOF

      # ==================== SET DATA_DIR AND DB_NAME ====================
      - name: Set DATA_DIR and DB_NAME
        id: dirs
        run: |
          DB_NAME="${{ steps.parse.outputs.database_name }}"
          DATA_DIR="${{ github.workspace }}/fantasy_football_data/espn_${{ steps.parse.outputs.database_name }}"
          echo "DB_NAME=${DB_NAME}" >> $GITHUB_ENV
          echo "DATA_DIR=${DATA_DIR}" >> $GITHUB_ENV
          echo "db_name=${DB_NAME}" >> $GITHUB_OUTPUT
          echo "data_dir=${DATA_DIR}" >> $GITHUB_OUTPUT
          echo "DB_NAME=${DB_NAME}"
          echo "DATA_DIR=${DATA_DIR}"

      # ==================== REGISTER LEAGUE (EARLY) ====================
      # Register league immediately so it's tracked even if import fails.
      - name: Register league (early)
        env:
          CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
          ESPN_LEAGUE_ID: ${{ steps.parse.outputs.espn_league_id }}
          LEAGUE_NAME: ${{ steps.parse.outputs.league_name }}
          DATABASE_NAME: ${{ steps.parse.outputs.database_name }}
        run: |
          source .venv/bin/activate
          python - <<'PYEOF'
          import sys
          sys.path.insert(0, 'fantasy_football_data_scripts')
          import os

          from multi_league.utils.credential_store import register_league, store_espn_league

          # Read ESPN cookies from files
          espn_s2 = ''
          swid = ''
          try:
              with open('.espn_s2', 'r') as f:
                  espn_s2 = f.read().strip()
              with open('.espn_swid', 'r') as f:
                  swid = f.read().strip()
          except FileNotFoundError:
              print("NOTE: ESPN cookie files not found (public league)")

          # Only store cookies if non-empty — don't overwrite existing encrypted cookies with blanks
          if espn_s2 and swid:
              store_espn_league(
                  espn_league_id=int(os.environ['ESPN_LEAGUE_ID']),
                  league_name=os.environ['LEAGUE_NAME'],
                  database_name=os.environ['DATABASE_NAME'],
                  espn_s2=espn_s2,
                  swid=swid
              )
              print("League registered with cookies (early)")
          else:
              register_league(
                  platform='espn',
                  league_id=os.environ['ESPN_LEAGUE_ID'],
                  league_name=os.environ['LEAGUE_NAME'],
                  database_name=os.environ['DATABASE_NAME'],
              )
              print("League registered without cookies (early) — existing cookies preserved")
          PYEOF

      # ==================== CREATE DATA DIRECTORY ====================
      - name: Create data directory
        run: |
          mkdir -p "${{ env.DATA_DIR }}"/{league_settings,rosters,matchups,drafts,transactions,schedules,box_scores}
          echo "Created data directory: ${{ env.DATA_DIR }}"

      # ==================== CREATE ESPN CONTEXT ====================
      - name: Create ESPN context
        env:
          IMPORT_MODE: ${{ steps.parse.outputs.import_mode }}
          LEAGUE_NAME: ${{ steps.parse.outputs.league_name }}
        run: |
          source .venv/bin/activate
          python - <<'PYEOF'
          import json
          import os
          import math
          from pathlib import Path
          from datetime import datetime

          with open("league_data_input.json") as f:
              league_data = json.load(f)

          import_mode = league_data.get('import_mode', 'quick')  # "quick" (free) or "quick_to_full" (paid)
          # Quick import: only current year (same as Yahoo quick import)
          season = int("${{ steps.parse.outputs.end_year }}")
          data_dir = Path(os.environ['DATA_DIR'])

          # Read ESPN cookies from files
          espn_s2 = ''
          swid = ''
          try:
              with open('.espn_s2') as f:
                  espn_s2 = f.read().strip()
              with open('.espn_swid') as f:
                  swid = f.read().strip()
          except FileNotFoundError:
              pass

          # Extract settings
          playoff_teams = league_data.get('playoff_teams', 6)
          playoff_start_week = league_data.get('playoff_start_week')

          # Calculate bye_teams
          if playoff_teams and playoff_teams > 1:
              next_power_of_2 = 2 ** math.ceil(math.log2(playoff_teams))
              bye_teams = next_power_of_2 - playoff_teams
          else:
              bye_teams = 0

          # Create ESPN context
          context = {
              "league_id": int("${{ steps.parse.outputs.espn_league_id }}"),
              "league_name": os.environ["LEAGUE_NAME"],
              "motherduck_db_name": "${{ steps.parse.outputs.database_name }}",
              "espn_s2": espn_s2,
              "swid": swid,
              "sport": "nfl",
              "start_year": season,  # Quick = current year only
              "end_year": season,
              "num_teams": league_data.get('num_teams'),
              "playoff_teams": playoff_teams,
              "bye_teams": bye_teams,
              "playoff_start_week": playoff_start_week,
              "regular_season_weeks": league_data.get('regular_season_weeks'),
              "uses_median_scoring": league_data.get('uses_median_scoring', False),
              "data_directory": str(data_dir),
              "max_workers": 3,
              "enable_caching": True,
              "team_to_manager": {},
              "team_to_guid": {},
              "team_to_team_name": {},
              "manager_name_overrides": league_data.get('manager_name_overrides', {}),
              "external_column_maps": league_data.get('external_column_maps', []),
              "external_identity_maps": league_data.get('external_identity_maps', {}),
              "created_at": datetime.now().isoformat(),
              "updated_at": datetime.now().isoformat(),
              "platform": "espn",
              "import_mode": "quick" if import_mode == "quick_to_full" else import_mode,
              "require_oauth": False,
              "keeper_rules": league_data.get('keeper_rules'),
              "league_rules": league_data.get('league_rules'),
              "standings_weights": league_data.get('standings_weights'),
              "league_ids": league_data.get('league_ids', {}),
          }

          context_path = data_dir / "espn_context.json"
          with open(context_path, 'w') as f:
              json.dump(context, f, indent=2)

          with open("espn_context.json", 'w') as f:
              json.dump(context, f, indent=2)

          print(f"[QUICK IMPORT] ESPN context created for year {season}")
          print(f"Context path: {context_path}")
          PYEOF

      # ==================== RUN ESPN IMPORT ====================
      - name: Run ESPN import
        id: import
        env:
          AUTO_CONFIRM: "1"
          CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
        working-directory: fantasy_football_data_scripts
        run: |
          source ../.venv/bin/activate
          echo "========================================"
          echo "Starting ESPN QUICK import for ${{ steps.parse.outputs.league_name }}"
          echo "League ID: ${{ steps.parse.outputs.espn_league_id }}"
          echo "Year: ${{ steps.parse.outputs.end_year }} (current year only)"
          echo "Import Mode: ${{ steps.parse.outputs.import_mode }}"
          echo "========================================"

          # Always run in "quick" mode — the import script only knows quick vs full
          SCRIPT_MODE="${{ steps.parse.outputs.import_mode }}"
          if [ "$SCRIPT_MODE" == "quick_to_full" ]; then
            SCRIPT_MODE="quick"
          fi

          set +e
          python espn_initial_import.py \
            --context ../espn_context.json \
            --import-mode ${SCRIPT_MODE} \
            --skip-track-2-upload \
            2>&1 | tee ../import.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "========================================"
            echo "ESPN IMPORT FAILED (exit code ${EXIT_CODE})"
            echo "========================================"
            echo ""
            echo "=== LAST 200 LINES OF IMPORT LOG ==="
            tail -200 ../import.log
            echo ""
            echo "=== SEARCHING FOR ERRORS ==="
            grep -i "error\|exception\|traceback\|failed" ../import.log | head -30 || echo "No obvious errors found"
            exit $EXIT_CODE
          fi

          echo ""
          echo "ESPN import completed successfully"

      # ==================== CALCULATE EXPECTED RECORDS ====================
      - name: Calculate expected records
        if: steps.import.outputs.exit_code == '0'
        run: |
          cd fantasy_football_data_scripts
          python -m multi_league.transformations.matchup.expected_record_v2 \
            --db ${{ env.DB_NAME }} \
            --data-dir ${{ env.DATA_DIR }} \
            --n-sims 10000

      # ==================== CALCULATE PLAYOFF ODDS ====================
      - name: Calculate playoff odds
        if: steps.import.outputs.exit_code == '0'
        run: |
          cd fantasy_football_data_scripts
          python -m multi_league.transformations.matchup.playoff_odds_import \
            --db ${{ env.DB_NAME }} \
            --data-dir ${{ env.DATA_DIR }} \
            --n-sims 10000

      # Populates keeper_year (consecutive years a player was kept by the same
      # franchise) in player_fantasy. The live worker bypasses LeagueSession,
      # so this must be an explicit workflow step.
      - name: Calculate keeper economics
        if: steps.import.outputs.exit_code == '0'
        run: |
          cd fantasy_football_data_scripts
          python -m multi_league.transformations.player.keeper_economics \
            --db ${{ env.DB_NAME }} \
            --data-dir ${{ env.DATA_DIR }}

      # ==================== RUN AGGREGATIONS ====================
      - name: Run aggregations
        if: steps.import.outputs.exit_code == '0'
        run: |
          cd fantasy_football_data_scripts
          python ../scripts/refresh_aggregates.py \
            --db ${{ env.DB_NAME }} \
            --data-dir ${{ env.DATA_DIR }}

      # ==================== UPLOAD LEAGUE DATA ====================
      - name: Upload league data
        if: steps.import.outputs.exit_code == '0'
        run: |
          cd fantasy_football_data_scripts
          python - <<'PYEOF'
          import os, sys
          sys.path.insert(0, '.')
          from multi_league.core.local_db import LocalLeagueDB
          data_dir = os.environ['DATA_DIR']
          db_name = os.environ['DB_NAME']
          db = LocalLeagueDB(data_dir, db_name)
          db.connect()
          db.upload_to_fly(db_name)
          print('Upload to Fly complete')
          db.close()
          PYEOF

      # ==================== STORE ESPN LEAGUE INFO ====================
      - name: Store ESPN league info
        if: steps.import.outputs.exit_code == '0'
        env:
          CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
          ESPN_LEAGUE_ID: ${{ steps.parse.outputs.espn_league_id }}
          LEAGUE_NAME: ${{ steps.parse.outputs.league_name }}
          DATABASE_NAME: ${{ steps.parse.outputs.database_name }}
        run: |
          source .venv/bin/activate
          python - <<'PYEOF'
          import sys
          sys.path.insert(0, 'fantasy_football_data_scripts')
          import os

          from multi_league.utils.credential_store import store_espn_league

          # Read ESPN cookies from files (written to repo root by parse step)
          espn_s2 = ''
          swid = ''
          try:
              with open('.espn_s2') as f:
                  espn_s2 = f.read().strip()
              with open('.espn_swid') as f:
                  swid = f.read().strip()
          except FileNotFoundError:
              print("NOTE: ESPN cookie files not found (public league)")

          store_espn_league(
              espn_league_id=int(os.environ['ESPN_LEAGUE_ID']),
              league_name=os.environ['LEAGUE_NAME'],
              database_name=os.environ['DATABASE_NAME'],
              espn_s2=espn_s2,
              swid=swid
          )
          if espn_s2 and swid:
              print("ESPN league info stored (cookies encrypted)")
          else:
              print("ESPN league info stored (public league, no cookies)")
          PYEOF

      # ==================== CLEANUP SENSITIVE FILES ====================
      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f .espn_s2 .espn_swid
          echo "Cleaned up sensitive files"

      # ==================== SUMMARY ====================
      - name: Print summary
        if: always()
        run: |
          echo "========================================"
          echo "ESPN IMPORT SUMMARY"
          echo "========================================"
          echo "League: ${{ steps.parse.outputs.league_name }}"
          echo "ESPN ID: ${{ steps.parse.outputs.espn_league_id }}"
          echo "Database: ${{ steps.parse.outputs.database_name }}"
          echo "Import exit code: ${{ steps.import.outputs.exit_code }}"
          echo "Import status: ${{ steps.import.outputs.exit_code == '0' && 'SUCCESS' || 'FAILED' }}"
          echo "========================================"
