name: ESPN Re-Import Worker (Full Pipeline)

# This workflow re-imports an ESPN league from scratch using stored credentials.
# Retrieves encrypted espn_s2/swid cookies from ___ops.espn_leagues in MotherDuck.
#
# Flow: Drop tables → Full Import → Homepage Summary → Playoff Simulations
#
# Use this when:
# - A client's ESPN import failed and you need to retry
# - You made pipeline changes and need to re-process an ESPN league
# - Data corruption requires a clean slate
# - ESPN cookies were refreshed and you need to re-import
#
# Triggered manually from GitHub Actions UI with just database_name.

on:
  workflow_dispatch:
    inputs:
      database_name:
        description: 'MotherDuck database name (e.g., qc_and_beyond)'
        required: true
        type: string
      start_year:
        description: 'Override start year (leave empty to use existing range)'
        required: false
        type: string
      end_year:
        description: 'Override end year (leave empty to use existing range)'
        required: false
        type: string
      drop_tables:
        description: 'Drop all existing tables first (clean slate)'
        required: false
        type: boolean
        default: true
      skip_simulations:
        description: 'Skip playoff simulations (faster)'
        required: false
        type: boolean
        default: false
      standings_preset:
        description: 'Standings weights preset (leave as "preserve" to keep existing config)'
        required: false
        type: choice
        default: 'preserve'
        options:
          - preserve
          - traditional
          - h2h_median
          - all_play
          - balanced
          - equal_thirds

  repository_dispatch:
    types: [espn_reimport]

concurrency:
  group: espn-reimport-${{ github.event.inputs.database_name || github.event.client_payload.database_name }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: read

jobs:
  reimport:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PYTHONUNBUFFERED: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          repository: jeleff1000/yahoo_oauth
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache Python virtualenv
        uses: actions/cache@v5
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.11-${{ hashFiles('requirements.txt') }}

      - name: Cache NFLverse data
        uses: actions/cache@v5
        with:
          path: ~/.nflverse
          key: nflverse-${{ runner.os }}-${{ hashFiles('fantasy_football_data_scripts/multi_league/data_fetchers/nfl_data.py') }}
          restore-keys: |
            nflverse-${{ runner.os }}-

      - name: Create virtualenv
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Activate virtualenv
        run: echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      # ==================== GET INPUTS ====================
      - name: Parse inputs
        id: inputs
        run: |
          DB_NAME="${{ github.event.inputs.database_name || github.event.client_payload.database_name }}"
          DROP_TABLES="${{ github.event.inputs.drop_tables || github.event.client_payload.drop_tables || 'true' }}"
          SKIP_SIMS="${{ github.event.inputs.skip_simulations || github.event.client_payload.skip_simulations || 'false' }}"
          STANDINGS="${{ github.event.inputs.standings_preset || github.event.client_payload.standings_preset || 'preserve' }}"

          if [ -z "$DB_NAME" ]; then
            echo "ERROR: database_name is required"
            exit 1
          fi

          echo "database_name=${DB_NAME}" >> $GITHUB_OUTPUT
          echo "drop_tables=${DROP_TABLES}" >> $GITHUB_OUTPUT
          echo "skip_simulations=${SKIP_SIMS}" >> $GITHUB_OUTPUT
          echo "standings_preset=${STANDINGS}" >> $GITHUB_OUTPUT

          USER_ID="espn_reimport_${DB_NAME}_$(date +%s)"
          echo "user_id=${USER_ID}" >> $GITHUB_OUTPUT

          echo "========================================"
          echo "ESPN RE-IMPORT CONFIGURATION"
          echo "========================================"
          echo "Database: ${DB_NAME}"
          echo "Drop Tables: ${DROP_TABLES}"
          echo "Skip Simulations: ${SKIP_SIMS}"
          echo "Standings Preset: ${STANDINGS}"
          echo "User ID: ${USER_ID}"
          echo "========================================"

      # ==================== RETRIEVE STORED ESPN CREDENTIALS ====================
      - name: Retrieve ESPN credentials from MotherDuck
        id: creds
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
          DATABASE_NAME: ${{ steps.inputs.outputs.database_name }}
          OVERRIDE_START_YEAR: ${{ github.event.inputs.start_year || github.event.client_payload.start_year || '' }}
          OVERRIDE_END_YEAR: ${{ github.event.inputs.end_year || github.event.client_payload.end_year || '' }}
        run: |
          echo "Retrieving ESPN credentials for: ${DATABASE_NAME}"

          python - <<'PYEOF'
          import duckdb
          import json
          import os
          import sys

          sys.path.insert(0, 'fantasy_football_data_scripts')
          from cryptography.fernet import Fernet

          db_name = os.environ['DATABASE_NAME']
          token = os.environ['MOTHERDUCK_TOKEN']
          enc_key = os.environ.get('CREDENTIAL_ENCRYPTION_KEY')
          override_start = os.environ.get('OVERRIDE_START_YEAR', '').strip()
          override_end = os.environ.get('OVERRIDE_END_YEAR', '').strip()

          if not enc_key:
              print("ERROR: CREDENTIAL_ENCRYPTION_KEY not set")
              sys.exit(1)

          conn = duckdb.connect(f"md:?motherduck_token={token}")

          # Get ESPN league info from credentials table
          result = conn.execute("""
              SELECT espn_league_id, league_name, database_name,
                     encrypted_espn_s2, encrypted_swid
              FROM ___ops.espn_leagues
              WHERE database_name = ?
          """, [db_name]).fetchone()

          if not result:
              print(f"ERROR: No ESPN credentials found for database: {db_name}")
              print("\nAvailable ESPN databases:")
              available = conn.execute("SELECT database_name, league_name FROM ___ops.espn_leagues").fetchall()
              for db, name in available:
                  print(f"  - {db} ({name})")
              sys.exit(1)

          espn_league_id, league_name, database_name, encrypted_s2, encrypted_swid = result

          # Decrypt ESPN cookies
          f = Fernet(enc_key.encode())
          espn_s2 = f.decrypt(encrypted_s2.encode()).decode()
          swid = f.decrypt(encrypted_swid.encode()).decode()

          print(f"Found ESPN credentials for: {league_name}")
          print(f"  League ID: {espn_league_id}")
          print(f"  Database: {database_name}")

          # Get year range from existing data
          start_year = None
          end_year = None
          num_teams = 10
          preserved_settings = {}

          try:
              conn_db = duckdb.connect(f"md:{db_name}?motherduck_token={token}")

              # Get year range from matchup table
              try:
                  years = conn_db.execute("SELECT MIN(year), MAX(year) FROM public.matchup").fetchone()
                  if years[0] and years[1]:
                      start_year = int(years[0])
                      end_year = int(years[1])
                      print(f"  Existing data: {start_year}-{end_year}")
              except:
                  pass

              # Get num_teams
              try:
                  teams = conn_db.execute(
                      "SELECT COUNT(DISTINCT manager) FROM public.matchup WHERE year = (SELECT MAX(year) FROM public.matchup)"
                  ).fetchone()
                  if teams[0]:
                      num_teams = int(teams[0])
              except:
                  pass

              # Retrieve user-configured settings from league_context (before drop)
              try:
                  cols = [r[0] for r in conn_db.execute(
                      "SELECT column_name FROM information_schema.columns WHERE table_catalog = ? AND table_name='league_context' AND table_schema='public'",
                      [db_name]
                  ).fetchall()]

                  json_cols = [c for c in ['standings_weights_json', 'keeper_rules_json', 'league_rules_json'] if c in cols]
                  str_cols = [c for c in ['manager_name_overrides'] if c in cols]
                  select_cols = json_cols + str_cols

                  if select_cols:
                      row = conn_db.execute(f"""
                          SELECT {', '.join(select_cols)}
                          FROM public.league_context
                          ORDER BY updated_at DESC NULLS LAST
                          LIMIT 1
                      """).fetchone()

                      if row:
                          for i, col in enumerate(select_cols):
                              val = row[i]
                              if val is not None and str(val).strip():
                                  preserved_settings[col] = val
                                  display_name = col.replace('_json', '')
                                  print(f"  Preserved: {display_name}")
              except Exception as e:
                  print(f"  Note: Could not read league_context: {e}")

              conn_db.close()
          except:
              pass

          conn.close()

          # Apply overrides
          if override_start:
              start_year = int(override_start)
              print(f"  Start year override: {start_year}")
          if override_end:
              end_year = int(override_end)
              print(f"  End year override: {end_year}")

          if not start_year or not end_year:
              print("ERROR: Could not determine year range. Use start_year/end_year overrides.")
              sys.exit(1)

          # Save preserved settings
          with open("preserved_settings.json", 'w') as pf:
              json.dump(preserved_settings, pf)
          if preserved_settings:
              print(f"Preserved {len(preserved_settings)} user-configured setting(s)")

          # Save ESPN cookies to files
          with open(".espn_s2", 'w') as cf:
              cf.write(espn_s2)
          with open(".espn_swid", 'w') as cf:
              cf.write(swid)

          print("ESPN cookies written to temp files")

          # Write outputs
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f"espn_league_id={espn_league_id}\n")
              out.write(f"league_name={league_name}\n")
              out.write(f"start_year={start_year}\n")
              out.write(f"end_year={end_year}\n")
              out.write(f"num_teams={num_teams}\n")
          PYEOF

      # ==================== UPDATE JOB STATUS ====================

      # ==================== DROP EXISTING TABLES ====================
      - name: Drop existing tables (clean slate)
        if: steps.inputs.outputs.drop_tables == 'true'
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          DATABASE_NAME: ${{ steps.inputs.outputs.database_name }}
        run: |
          echo "========================================"
          echo "DROPPING ALL TABLES (clean slate)"
          echo "========================================"

          python - <<'PYEOF'
          import duckdb
          import os

          db_name = os.environ['DATABASE_NAME']
          token = os.environ['MOTHERDUCK_TOKEN']

          try:
              conn = duckdb.connect(f"md:{db_name}?motherduck_token={token}")
              conn.execute("CREATE SCHEMA IF NOT EXISTS public")

              # Drop views first (filter by THIS database only)
              views = conn.execute("""
                  SELECT table_name FROM information_schema.tables
                  WHERE table_catalog = ? AND table_schema = 'public' AND table_type = 'VIEW'
              """, [db_name]).fetchall()
              for (view_name,) in views:
                  conn.execute(f"DROP VIEW IF EXISTS public.{view_name}")
              print(f"  Dropped {len(views)} views")

              # Drop tables (filter by THIS database only)
              tables = conn.execute("""
                  SELECT table_name FROM information_schema.tables
                  WHERE table_catalog = ? AND table_schema = 'public' AND table_type = 'BASE TABLE'
              """, [db_name]).fetchall()
              for (table_name,) in tables:
                  conn.execute(f"DROP TABLE IF EXISTS public.{table_name}")
              print(f"  Dropped {len(tables)} tables")

              conn.close()
              print("Clean slate ready")
          except Exception as e:
              print(f"Warning: Could not drop tables: {e}")
          PYEOF

      # ==================== CREATE DATA DIRECTORY ====================
      - name: Create data directory
        id: datadir
        run: |
          DATA_DIR="fantasy_football_data/espn_${{ steps.inputs.outputs.database_name }}"
          mkdir -p "$DATA_DIR"/{league_settings,rosters,matchups,drafts,transactions,schedules,box_scores}
          echo "data_directory=$DATA_DIR" >> $GITHUB_OUTPUT
          echo "Created data directory: $DATA_DIR"

      # ==================== CREATE ESPN CONTEXT ====================
      - name: Create ESPN context
        env:
          STANDINGS_PRESET: ${{ steps.inputs.outputs.standings_preset }}
        run: |
          source .venv/bin/activate
          python - <<'PYEOF'
          import json
          import os
          import math
          from pathlib import Path
          from datetime import datetime

          # Standings weight presets
          STANDINGS_PRESETS = {
              "traditional": {
                  "enabled": True, "preset": "traditional",
                  "weights": {"h2h_wins": 1.0, "above_median_wins": 0.0, "all_play_wins": 0.0, "total_points": 0.0, "optimal_points": 0.0, "lineup_efficiency": 0.0},
              },
              "h2h_median": {
                  "enabled": True, "preset": "h2h_median",
                  "weights": {"h2h_wins": 1.0, "above_median_wins": 1.0, "all_play_wins": 0.0, "total_points": 0.0, "optimal_points": 0.0, "lineup_efficiency": 0.0},
              },
              "all_play": {
                  "enabled": True, "preset": "all_play",
                  "weights": {"h2h_wins": 0.0, "above_median_wins": 0.0, "all_play_wins": 1.0, "total_points": 0.0, "optimal_points": 0.0, "lineup_efficiency": 0.0},
              },
              "balanced": {
                  "enabled": True, "preset": "balanced",
                  "weights": {"h2h_wins": 1.0, "above_median_wins": 0.5, "all_play_wins": 0.0, "total_points": 0.001, "optimal_points": 0.0, "lineup_efficiency": 0.0},
              },
              "equal_thirds": "dynamic",
          }

          espn_league_id = int("${{ steps.creds.outputs.espn_league_id }}")
          league_name = "${{ steps.creds.outputs.league_name }}"
          start_year = int("${{ steps.creds.outputs.start_year }}")
          end_year = int("${{ steps.creds.outputs.end_year }}")
          num_teams = int("${{ steps.creds.outputs.num_teams }}")
          data_dir = Path("fantasy_football_data/espn_${{ steps.inputs.outputs.database_name }}").resolve()

          # Read ESPN cookies from files
          espn_s2 = ''
          swid = ''
          try:
              with open('.espn_s2') as f:
                  espn_s2 = f.read().strip()
              with open('.espn_swid') as f:
                  swid = f.read().strip()
          except FileNotFoundError:
              print("ERROR: ESPN cookie files not found")
              exit(1)

          # Load preserved settings
          preserved = {}
          try:
              with open("preserved_settings.json") as f:
                  preserved = json.load(f)
          except FileNotFoundError:
              pass

          context = {
              "league_id": espn_league_id,
              "league_name": league_name,
              "motherduck_db_name": "${{ steps.inputs.outputs.database_name }}",
              "espn_s2": espn_s2,
              "swid": swid,
              "sport": "nfl",
              "start_year": start_year,
              "end_year": end_year,
              "num_teams": num_teams,
              "data_directory": str(data_dir),
              "max_workers": 3,
              "enable_caching": True,
              "team_to_manager": {},
              "team_to_guid": {},
              "team_to_team_name": {},
              "created_at": datetime.now().isoformat(),
              "updated_at": datetime.now().isoformat(),
              "platform": "espn",
              "import_mode": "full",
              "require_oauth": False,
          }

          # Inject preserved user-configured settings
          if preserved.get("standings_weights_json"):
              context["standings_weights"] = json.loads(preserved["standings_weights_json"])
              print(f"  Restored standings_weights from database")
          if preserved.get("keeper_rules_json"):
              context["keeper_rules"] = json.loads(preserved["keeper_rules_json"])
              print(f"  Restored keeper_rules")
          if preserved.get("league_rules_json"):
              context["league_rules"] = json.loads(preserved["league_rules_json"])
              print(f"  Restored league_rules")
          if preserved.get("manager_name_overrides"):
              val = preserved["manager_name_overrides"]
              if isinstance(val, str):
                  val = json.loads(val)
              context["manager_name_overrides"] = val
              print(f"  Restored manager_name_overrides")

          # Override standings weights if a preset was explicitly chosen
          standings_preset = os.environ.get('STANDINGS_PRESET', 'preserve').strip()
          if standings_preset and standings_preset != 'preserve' and standings_preset in STANDINGS_PRESETS:
              preset_val = STANDINGS_PRESETS[standings_preset]
              if preset_val == "dynamic":
                  all_play_weight = round(1.0 / max(num_teams - 1, 1), 4)
                  preset_val = {
                      "enabled": True, "preset": "equal_thirds",
                      "weights": {"h2h_wins": 1.0, "above_median_wins": 1.0, "all_play_wins": all_play_weight, "total_points": 0.0, "optimal_points": 0.0, "lineup_efficiency": 0.0},
                  }
                  print(f"  Standings weights overridden: equal_thirds (all_play_weight={all_play_weight})")
              else:
                  print(f"  Standings weights overridden: {standings_preset}")
              context["standings_weights"] = preset_val

          context_path = data_dir / "espn_context.json"
          with open(context_path, 'w') as f:
              json.dump(context, f, indent=2)
          with open("espn_context.json", 'w') as f:
              json.dump(context, f, indent=2)

          print(f"ESPN context created: {start_year}-{end_year} (full reimport)")
          PYEOF

      # ==================== RUN ESPN IMPORT ====================
      - name: Run ESPN import
        id: import
        env:
          AUTO_CONFIRM: "1"
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
        working-directory: fantasy_football_data_scripts
        run: |
          source ../.venv/bin/activate
          echo "========================================"
          echo "ESPN FULL RE-IMPORT"
          echo "League: ${{ steps.creds.outputs.league_name }}"
          echo "League ID: ${{ steps.creds.outputs.espn_league_id }}"
          echo "Years: ${{ steps.creds.outputs.start_year }}-${{ steps.creds.outputs.end_year }}"
          echo "========================================"

          set +e
          python espn_initial_import.py \
            --context ../espn_context.json \
            --import-mode full \
            2>&1 | tee ../import.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -ne 0 ]; then
            echo "ESPN RE-IMPORT FAILED (exit code ${EXIT_CODE})"
            tail -200 ../import.log
            exit $EXIT_CODE
          fi

          echo "ESPN re-import completed successfully"

      # ==================== VERIFY PARQUET FILES ====================
      - name: Verify parquet files
        if: steps.import.outputs.exit_code == '0'
        id: verify
        run: |
          DATA_DIR="fantasy_football_data/espn_${{ steps.inputs.outputs.database_name }}"
          PARQUET_COUNT=$(find "$DATA_DIR" -name "*.parquet" -type f | wc -l)
          echo "Found ${PARQUET_COUNT} parquet files"
          if [ "$PARQUET_COUNT" -eq 0 ]; then
            echo "ERROR: No parquet files created!"
            exit 1
          fi
          echo "file_count=${PARQUET_COUNT}" >> $GITHUB_OUTPUT

      # ==================== VALIDATE CRITICAL TABLES ====================
      - name: Validate critical tables
        if: steps.import.outputs.exit_code == '0'
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          DATABASE_NAME: ${{ steps.inputs.outputs.database_name }}
        run: |
          source .venv/bin/activate
          python - <<'PYEOF'
          import duckdb
          import os

          db_name = os.environ['DATABASE_NAME']
          token = os.environ['MOTHERDUCK_TOKEN']

          CRITICAL_TABLES = ['matchup', 'player_fantasy', 'draft', 'transactions', 'schedule']
          conn = duckdb.connect(f'md:?motherduck_token={token}')
          print(f"Validating database: {db_name}")
          for table in CRITICAL_TABLES:
              try:
                  result = conn.execute(f'SELECT COUNT(*) FROM {db_name}.public.{table}').fetchone()
                  count = result[0] if result else 0
                  status = "OK" if count > 0 else "EMPTY"
                  print(f"  {table}: {count:,} rows [{status}]")
              except Exception as e:
                  print(f"  {table}: ERROR - {e}")
          conn.close()
          PYEOF

      # ==================== CLEANUP DEPRECATED COLUMNS ====================
      - name: Cleanup deprecated columns
        if: steps.import.outputs.exit_code == '0'
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          DATABASE_NAME: ${{ steps.inputs.outputs.database_name }}
        run: |
          source .venv/bin/activate
          echo "Cleaning up deprecated columns..."
          python -c "import os; import sys; sys.path.insert(0, '.'); from streamlit_helpers.database import drop_deprecated_columns; db=os.environ.get('DATABASE_NAME',''); tok=os.environ.get('MOTHERDUCK_TOKEN',''); dropped=drop_deprecated_columns(db,tok,dry_run=False) if db and tok else []; print(f'Dropped {len(dropped)} deprecated columns') if dropped else print('No deprecated columns to drop')"

      # ==================== COMPUTE HOMEPAGE SUMMARY ====================
      - name: Compute homepage summary
        if: steps.import.outputs.exit_code == '0'
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          source .venv/bin/activate
          echo "Computing precomputed homepage summary tables..."
          python fantasy_football_data_scripts/multi_league/transformations/aggregation/homepage_summary.py \
            --context espn_context.json --upload || {
            exit_code=$?
            if [ "$exit_code" -eq 139 ]; then
              echo "⚠️ DuckDB segfault on shutdown (exit 139) — data already uploaded, ignoring"
            else
              exit $exit_code
            fi
          }
          echo "Homepage summary complete!"

      # ==================== RE-AGGREGATE TABLES ====================
      - name: Re-aggregate season/career tables
        if: steps.import.outputs.exit_code == '0'
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          source .venv/bin/activate
          echo "Re-aggregating player_fantasy_season and player_fantasy_career tables..."
          python fantasy_football_data_scripts/multi_league/transformations/aggregation/aggregate_fantasy_context.py \
            --context espn_context.json
          echo "Aggregation complete!"

      # ==================== STORE UPDATED ESPN CREDENTIALS ====================
      - name: Update stored ESPN credentials
        if: steps.import.outputs.exit_code == '0'
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
          ESPN_LEAGUE_ID: ${{ steps.creds.outputs.espn_league_id }}
          LEAGUE_NAME: ${{ steps.creds.outputs.league_name }}
          DATABASE_NAME: ${{ steps.inputs.outputs.database_name }}
        run: |
          source .venv/bin/activate
          python - <<'PYEOF'
          import sys
          sys.path.insert(0, 'fantasy_football_data_scripts')
          import os

          from multi_league.utils.credential_store import store_espn_league

          espn_s2 = ''
          swid = ''
          try:
              with open('.espn_s2') as f:
                  espn_s2 = f.read().strip()
              with open('.espn_swid') as f:
                  swid = f.read().strip()
          except FileNotFoundError:
              print("NOTE: ESPN cookie files not found (public league)")

          store_espn_league(
              espn_league_id=int(os.environ['ESPN_LEAGUE_ID']),
              league_name=os.environ['LEAGUE_NAME'],
              database_name=os.environ['DATABASE_NAME'],
              espn_s2=espn_s2,
              swid=swid
          )
          if espn_s2 and swid:
              print("ESPN credentials re-stored (cookies encrypted)")
          else:
              print("ESPN league info stored (public league, no cookies)")
          PYEOF

      # ==================== TRIGGER SIMULATIONS ====================
      - name: Trigger playoff simulations
        if: steps.import.outputs.exit_code == '0' && steps.inputs.outputs.skip_simulations != 'true'
        uses: ./.github/actions/trigger-downstream
        with:
          database_name: ${{ steps.inputs.outputs.database_name }}
          user_id: ${{ steps.inputs.outputs.user_id }}
          import_mode: 'full'
          season: ${{ steps.creds.outputs.end_year }}
          actual_start_year: ${{ steps.creds.outputs.start_year }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          n_sims: '10000'
          platform: 'espn'

      # ==================== CLEANUP ====================
      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f .espn_s2 .espn_swid
          echo "Cleaned up sensitive files"

      # ==================== ARTIFACTS ====================
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: espn-reimport-${{ steps.inputs.outputs.database_name }}
          path: |
            import.log
            espn_context.json
            preserved_settings.json
          retention-days: 30

      # ==================== SUMMARY ====================
      - name: Create workflow summary
        if: always()
        run: |
          echo "# ESPN Re-Import Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## League Information" >> $GITHUB_STEP_SUMMARY
          echo "- **League**: ${{ steps.creds.outputs.league_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **ESPN ID**: ${{ steps.creds.outputs.espn_league_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Database**: \`${{ steps.inputs.outputs.database_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Years**: ${{ steps.creds.outputs.start_year }}-${{ steps.creds.outputs.end_year }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.import.outputs.exit_code }}" == "0" ]; then
            echo "## Status: SUCCESS" >> $GITHUB_STEP_SUMMARY
            echo "- Parquet files: ${{ steps.verify.outputs.file_count }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Site URL**: https://leaguehistory.streamlit.app/?league=${{ steps.inputs.outputs.database_name }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Status: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "Check the logs for details" >> $GITHUB_STEP_SUMMARY
          fi
