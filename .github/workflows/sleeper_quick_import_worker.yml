name: Sleeper Quick Import Worker (Current Year Only)

# This workflow imports ONLY the current year for fast startup (~5 min).
# Self-contained: fetch → transforms → enrichments → sims → aggregations → upload.
# Called from: Streamlit UI via trigger_import_workflow.py

on:
  workflow_dispatch:
    inputs:
      league_data_b64:
        description: 'Base64-encoded JSON with Sleeper league configuration'
        required: false
        type: string
      league_data:
        description: 'DEPRECATED - raw JSON (for backward compat)'
        required: false
        type: string
      user_id:
        description: 'Unique identifier for this user/import job'
        required: true
        type: string
      yahoo_oauth_ref:
        description: 'yahoo_oauth branch/ref to check out (workers-repo override; default main)'
        required: false
        type: string
        default: 'main'

  repository_dispatch:
    types: [sleeper_quick_import]

# Prevent multiple imports for the same user running simultaneously
concurrency:
  group: sleeper-import-${{ github.event.inputs.user_id || github.event.client_payload.user_id }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: read

jobs:
  resolve-db-lock:
    runs-on: ubuntu-latest
    outputs:
      database_name: ${{ steps.resolve.outputs.database_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          repository: jeleff1000/yahoo_oauth
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.inputs.yahoo_oauth_ref || github.event.client_payload.yahoo_oauth_ref || 'main' }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Resolve lock key
        id: resolve
        run: |
          python .github/scripts/resolve_sleeper_workflow_input.py
        env:
          LEAGUE_DATA_B64: ${{ github.event.inputs.league_data_b64 || github.event.client_payload.league_data_b64 }}
          LEAGUE_DATA_RAW: ${{ github.event.inputs.league_data || github.event.client_payload.league_data }}
          DATABASE_BACKEND: fly
          DATABASE_SERVER_URL: ${{ secrets.DATABASE_SERVER_URL }}
          DATABASE_READ_TOKEN: ${{ secrets.DATABASE_READ_TOKEN }}

  import-sleeper-league:
    needs: resolve-db-lock
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Sleeper imports are faster (no OAuth, public API)
    concurrency:
      group: central-db-write-${{ needs.resolve-db-lock.outputs.database_name }}
      cancel-in-progress: false

    env:
      PYTHONUNBUFFERED: 1
      IMPORT_PIPELINE_V2: ${{ vars.IMPORT_PIPELINE_V2 }}
      DATABASE_BACKEND: fly
      DATABASE_SERVER_URL: ${{ secrets.DATABASE_SERVER_URL }}
      DATABASE_READ_TOKEN: ${{ secrets.DATABASE_READ_TOKEN }}
      DATABASE_ADMIN_TOKEN: ${{ secrets.DATABASE_ADMIN_TOKEN }}
      OPS_CACHE_PATH: ${{ github.workspace }}/ops_cache/ops_cache.duckdb

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          repository: jeleff1000/yahoo_oauth
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.inputs.yahoo_oauth_ref || github.event.client_payload.yahoo_oauth_ref || 'main' }}

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Restore ops cache
        id: ops-cache
        uses: actions/cache@v5
        with:
          path: ops_cache
          key: ops-cache-v2-${{ hashFiles('fantasy_football_data_scripts/build_ops_cache.py') }}
          restore-keys: ops-cache-v2-

      - name: Build ops cache (on miss)
        if: steps.ops-cache.outputs.cache-hit != 'true'
        env:
          DATABASE_SERVER_URL: ${{ secrets.DATABASE_SERVER_URL }}
          DATABASE_READ_TOKEN: ${{ secrets.DATABASE_READ_TOKEN }}
        run: |
          pip install duckdb==1.5.1
          python fantasy_football_data_scripts/build_ops_cache.py \
            --output ops_cache/ops_cache.duckdb

      - name: Cache Python virtualenv
        uses: actions/cache@v5
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('requirements.txt') }}


      - name: Create virtualenv
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Activate venv
        run: |
          echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      # ==================== PARSE INPUT ====================
      - name: Parse league data
        id: parse
        run: |
          source .venv/bin/activate
          python .github/scripts/resolve_sleeper_workflow_input.py
        env:
          LEAGUE_DATA_B64: ${{ github.event.inputs.league_data_b64 || github.event.client_payload.league_data_b64 }}
          LEAGUE_DATA_RAW: ${{ github.event.inputs.league_data || github.event.client_payload.league_data }}
          USER_ID: ${{ github.event.inputs.user_id || github.event.client_payload.user_id }}
          IMPORT_MODE: ${{ github.event.client_payload.import_mode || 'quick' }}
          PRE_RESOLVED_DATABASE_NAME: ${{ needs.resolve-db-lock.outputs.database_name }}
          OUTPUT_JSON_PATH: league_data_input.json

      # ==================== REGISTER LEAGUE (EARLY) ====================
      # Register league immediately so it's tracked even if import fails.
      - name: Register league (early)
        env:
          SLEEPER_LEAGUE_ID: ${{ steps.parse.outputs.sleeper_league_id }}
          LEAGUE_NAME: ${{ steps.parse.outputs.league_name }}
          DATABASE_NAME: ${{ steps.parse.outputs.database_name }}
        run: |
          source .venv/bin/activate
          python - <<'PYEOF' || {
          import sys
          sys.path.insert(0, 'fantasy_football_data_scripts')
          import os

          from multi_league.utils.credential_store import register_league

          register_league(
              platform='sleeper',
              league_id=os.environ['SLEEPER_LEAGUE_ID'],
              league_name=os.environ['LEAGUE_NAME'],
              database_name=os.environ['DATABASE_NAME']
          )
          print("League registered (early)")
          PYEOF
            exit_code=$?
            if [ "$exit_code" -eq 139 ]; then
              echo "⚠️ DuckDB segfault on shutdown (exit 139) — league already registered, ignoring"
            else
              exit $exit_code
            fi
          }

      # ==================== CREATE DATA DIRECTORY ====================
      - name: Create data directory
        run: |
          # Create directory structure for Sleeper data
          DATA_DIR="fantasy_football_data/sleeper_${{ steps.parse.outputs.database_name }}"
          mkdir -p "$DATA_DIR"/{league_settings,rosters,matchups,drafts,transactions}
          echo "data_directory=$DATA_DIR" >> $GITHUB_OUTPUT
          echo "Created data directory: $DATA_DIR"
        id: datadir

      # ==================== CREATE SLEEPER CONTEXT ====================
      - name: Create Sleeper context
        env:
          IMPORT_MODE: ${{ steps.parse.outputs.import_mode }}
          LEAGUE_NAME: ${{ steps.parse.outputs.league_name }}
        run: |
          source .venv/bin/activate
          python - <<'PYEOF'
          import json
          import os
          from pathlib import Path
          from datetime import datetime

          with open("league_data_input.json") as f:
              league_data = json.load(f)

          import_mode = league_data.get('import_mode', 'quick')  # "quick" (free) or "quick_to_full" (paid)
          data_dir = Path("fantasy_football_data/sleeper_${{ steps.parse.outputs.database_name }}").resolve()

          # Extract playoff settings from UI (if passed) or use defaults
          playoff_teams = league_data.get('playoff_teams', 6)
          playoff_round_type = league_data.get('playoff_round_type', 0)
          playoff_start_week = league_data.get('playoff_week_start') or league_data.get('playoff_start_week')

          # Calculate bye_teams from bracket math (standard tournament structure)
          # NOTE: playoff_round_type is about multi-week rounds (0=single, 1=2-week champ),
          # NOT about byes. Byes are determined by bracket structure.
          import math
          if playoff_teams > 1:
              next_power_of_2 = 2 ** math.ceil(math.log2(playoff_teams))
              bye_teams = next_power_of_2 - playoff_teams
          else:
              bye_teams = 0

          # Detect H2H+Median from standings_weights or explicit flag
          standings_weights = league_data.get('standings_weights')
          uses_median_scoring = league_data.get('uses_median_scoring', False)

          # If standings_weights has above_median_wins, mark as median scoring
          if standings_weights and standings_weights.get('weights', {}).get('above_median_wins', 0) > 0:
              uses_median_scoring = True

          # If uses_median_scoring is True but no standings_weights passed, auto-generate
          if uses_median_scoring and not standings_weights:
              standings_weights = {
                  "enabled": True,
                  "weights": {
                      "h2h_wins": 1.0,
                      "above_median_wins": 1.0,
                      "all_play_wins": 0.0,
                      "total_points": 0.0,
                      "optimal_points": 0.0,
                      "lineup_efficiency": 0.0,
                  },
                  "preset": "h2h_median",
              }

          # Create Sleeper context (matches SleeperContext format)
          context = {
              "league_id": "${{ steps.parse.outputs.sleeper_league_id }}",
              "league_name": os.environ["LEAGUE_NAME"],
              "motherduck_db_name": "${{ steps.parse.outputs.database_name }}",
              "username": "${{ steps.parse.outputs.username }}",
              "sport": "nfl",
              "start_year": int("${{ steps.parse.outputs.start_year }}"),
              "end_year": int("${{ steps.parse.outputs.end_year }}"),
              "num_teams": league_data.get('num_teams'),
              "playoff_teams": playoff_teams,
              "bye_teams": bye_teams,
              "playoff_start_week": playoff_start_week,
              "regular_season_weeks": league_data.get('regular_season_weeks'),
              "uses_median_scoring": uses_median_scoring,
              "data_directory": str(data_dir),
              "max_workers": 3,
              "enable_caching": True,
              "rate_limit_per_min": 1000,  # Sleeper has generous rate limits
              "roster_to_manager": {},
              "roster_to_guid": {},
              "manager_name_overrides": league_data.get('manager_name_overrides', {}),
              "external_column_maps": league_data.get('external_column_maps', []),
              "external_identity_maps": league_data.get('external_identity_maps', {}),
              "league_ids": league_data.get('league_ids', {}),  # Pre-seeded if combining, else populated by fetcher
              "user_id": None,  # Will be populated by fetcher
              "created_at": datetime.now().isoformat(),
              "updated_at": datetime.now().isoformat(),
              "platform": "sleeper",
              "import_mode": "quick" if import_mode == "quick_to_full" else import_mode,
              "require_oauth": False,
              # Advanced settings (same as Yahoo)
              "keeper_rules": league_data.get('keeper_rules'),
              "league_rules": league_data.get('league_rules'),
              "standings_weights": standings_weights,
          }

          context_path = data_dir / "sleeper_context.json"
          with open(context_path, 'w') as f:
              json.dump(context, f, indent=2)

          # Also save to root for import script
          with open("sleeper_context.json", 'w') as f:
              json.dump(context, f, indent=2)

          print(f"Sleeper context created: {context['start_year']}-{context['end_year']} (mode: {import_mode})")
          print(f"Context path: {context_path}")
          PYEOF

      # ==================== RUN SLEEPER IMPORT ====================
      - name: Run Sleeper import
        id: import
        env:
          AUTO_CONFIRM: "1"
        working-directory: fantasy_football_data_scripts
        run: |
          source ../.venv/bin/activate
          echo "========================================"
          echo "Starting Sleeper import for ${{ steps.parse.outputs.league_name }}"
          echo "League ID: ${{ steps.parse.outputs.sleeper_league_id }}"
          echo "Years: ${{ steps.parse.outputs.start_year }}-${{ steps.parse.outputs.end_year }}"
          echo "Import Mode: ${{ steps.parse.outputs.import_mode }}"
          echo "========================================"

          # Run Sleeper import with detailed error capture
          # Always run in "quick" mode — the import script only knows quick vs full
          # "quick_to_full" is a routing concept handled at the workflow level
          SCRIPT_MODE="${{ steps.parse.outputs.import_mode }}"
          if [ "$SCRIPT_MODE" == "quick_to_full" ]; then
            SCRIPT_MODE="quick"
          fi
          set +e
          python sleeper_initial_import.py \
            --context ../sleeper_context.json \
            --import-mode ${SCRIPT_MODE} \
            --skip-track-2-upload \
            2>&1 | tee ../import.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "========================================"
            echo "SLEEPER IMPORT FAILED (exit code ${EXIT_CODE})"
            echo "========================================"
            echo ""

            echo "=== LAST 200 LINES OF IMPORT LOG ==="
            tail -200 ../import.log
            echo ""

            echo "=== SEARCHING FOR ERRORS ==="
            grep -i "error\|exception\|traceback\|failed" ../import.log | head -30 || echo "No obvious errors found"

            exit $EXIT_CODE
          fi

          echo ""
          echo "Sleeper import completed successfully"

      # ==================== VERIFY LOCAL DUCKDB ARTIFACTS ====================
      - name: Verify local DuckDB artifacts
        if: steps.import.outputs.exit_code == '0'
        id: verify
        env:
          DATABASE_NAME: ${{ steps.parse.outputs.database_name }}
        run: |
          source .venv/bin/activate
          LOCAL_DATA_DIR="fantasy_football_data/sleeper_${{ steps.parse.outputs.database_name }}"
          LOCAL_DB="$LOCAL_DATA_DIR/${{ steps.parse.outputs.database_name }}.duckdb"
          export LOCAL_DB

          python - <<'PYEOF'
          import os
          import sys
          from pathlib import Path

          import duckdb

          db_path = Path(os.environ["LOCAL_DB"])
          required = ["league_settings", "matchup", "player_fantasy", "draft", "transactions", "schedule"]

          if not db_path.exists():
              print(f"ERROR: Local DuckDB not found: {db_path}")
              sys.exit(1)

          conn = duckdb.connect(str(db_path), read_only=True)
          existing = {
              row[0]
              for row in conn.execute(
                  "SELECT table_name FROM information_schema.tables WHERE table_schema = 'public'"
              ).fetchall()
          }
          missing = [table for table in required if table not in existing]

          print(f"Local DuckDB: {db_path}")
          if missing:
              print("ERROR: Missing canonical tables: " + ", ".join(missing))
              sys.exit(1)

          print("Canonical table row counts:")
          for table in required:
              count = conn.execute(f"SELECT COUNT(*) FROM public.{table}").fetchone()[0]
              print(f"  {table}: {count}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"local_db_path={db_path.as_posix()}\n")
              fh.write(f"table_count={len(required)}\n")
          PYEOF

      # ==================== CALCULATE EXPECTED RECORDS ====================
      - name: Calculate expected records
        if: steps.import.outputs.exit_code == '0'
        run: |
          cd fantasy_football_data_scripts
          python -m multi_league.transformations.matchup.expected_record_v2 \
            --db ${{ steps.parse.outputs.database_name }} \
            --data-dir ${{ github.workspace }}/fantasy_football_data/sleeper_${{ steps.parse.outputs.database_name }} \
            --n-sims 10000

      # ==================== CALCULATE PLAYOFF ODDS ====================
      - name: Calculate playoff odds
        if: steps.import.outputs.exit_code == '0'
        run: |
          cd fantasy_football_data_scripts
          python -m multi_league.transformations.matchup.playoff_odds_import \
            --db ${{ steps.parse.outputs.database_name }} \
            --data-dir ${{ github.workspace }}/fantasy_football_data/sleeper_${{ steps.parse.outputs.database_name }} \
            --n-sims 10000

      # ==================== RUN AGGREGATIONS ====================
      - name: Run aggregations
        if: steps.import.outputs.exit_code == '0'
        run: |
          cd fantasy_football_data_scripts
          python ../scripts/refresh_aggregates.py \
            --db ${{ steps.parse.outputs.database_name }} \
            --data-dir ${{ github.workspace }}/fantasy_football_data/sleeper_${{ steps.parse.outputs.database_name }}

      # ==================== UPLOAD LEAGUE DATA ====================
      - name: Upload league data
        if: steps.import.outputs.exit_code == '0'
        run: |
          cd fantasy_football_data_scripts
          python -c "
          import os, sys
          sys.path.insert(0, '.')
          from multi_league.core.local_db import LocalLeagueDB
          data_dir = '${{ github.workspace }}/fantasy_football_data/sleeper_${{ steps.parse.outputs.database_name }}'
          db_name = '${{ steps.parse.outputs.database_name }}'
          db = LocalLeagueDB(data_dir, db_name)
          db.connect()
          db.upload_to_fly(db_name)
          print('Upload to Fly complete')
          db.close()
          "

      # ==================== UPDATE LEAGUE DATA WITH DISCOVERED IDS ====================
      # The import discovers year-specific league_ids which are critical for
      # historical imports to fetch bracket/championship data correctly
      - name: Update league data with discovered league_ids
        if: steps.import.outputs.exit_code == '0'
        run: |
          source .venv/bin/activate
          python - <<'PYEOF'
          import json
          from pathlib import Path

          # Read the updated context (has discovered league_ids)
          context_path = Path("sleeper_context.json")
          if not context_path.exists():
              print("WARNING: sleeper_context.json not found, skipping league_ids update")
              exit(0)

          with open(context_path) as f:
              context = json.load(f)

          league_ids = context.get('league_ids', {})
          if not league_ids:
              print("WARNING: No league_ids in context, skipping update")
              exit(0)

          # Update the league_data_input.json for downstream workflows
          input_path = Path("league_data_input.json")
          if not input_path.exists():
              print("WARNING: league_data_input.json not found")
              exit(0)

          with open(input_path) as f:
              league_data = json.load(f)

          league_data['league_ids'] = league_ids
          history_years = []
          for year_key in league_ids:
              try:
                  history_years.append(int(year_key))
              except (TypeError, ValueError):
                  continue
          if history_years:
              start_year = min(history_years)
              end_year = max(history_years)
              league_data['start_year'] = start_year
              league_data['end_year'] = end_year
              league_data['season'] = end_year
              print(f"Historical years synced to {start_year}-{end_year}")
          print(f"Adding {len(league_ids)} discovered league_ids to input data")
          print(f"Years: {sorted(league_ids.keys())}")

          with open(input_path, 'w') as f:
              json.dump(league_data, f, indent=2)

          print("Updated league_data_input.json with discovered league_ids")
          PYEOF

      # ==================== SUMMARY ====================
      - name: Print summary
        if: always()
        run: |
          echo "========================================"
          echo "SLEEPER IMPORT SUMMARY"
          echo "========================================"
          echo "League: ${{ steps.parse.outputs.league_name }}"
          echo "Sleeper ID: ${{ steps.parse.outputs.sleeper_league_id }}"
          echo "Database: ${{ steps.parse.outputs.database_name }}"
          echo "Import exit code: ${{ steps.import.outputs.exit_code }}"
          echo "Import status: ${{ steps.import.outputs.exit_code == '0' && 'SUCCESS' || 'FAILED' }}"
          echo "Local DuckDB: ${{ steps.verify.outputs.local_db_path }}"
          echo "Canonical tables verified: ${{ steps.verify.outputs.table_count }}"
          echo "========================================"
