name: Sleeper Full Import Worker (All Years)

# This workflow imports ALL years including current year to run complete transformations.
# Quick import fetches raw data; full import runs transformations on the complete dataset.
# Called from: trigger-downstream action after sleeper_quick_import_worker.yml completes.

on:
  workflow_dispatch:
    inputs:
      league_data_b64:
        description: 'Base64-encoded JSON with Sleeper league configuration'
        required: false
        type: string
      user_id:
        description: 'Unique identifier for this user/import job'
        required: true
        type: string
      yahoo_oauth_ref:
        description: 'yahoo_oauth branch/ref to check out (workers-repo override; default main)'
        required: false
        type: string
        default: 'main'

  repository_dispatch:
    types: [sleeper_full_import]

# Prevent multiple imports for the same user running simultaneously
concurrency:
  group: sleeper-full-import-${{ github.event.inputs.user_id || github.event.client_payload.user_id }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: read

jobs:
  resolve-db-lock:
    runs-on: ubuntu-latest
    outputs:
      database_name: ${{ steps.resolve.outputs.database_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.yahoo_oauth_ref || 'main' }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Resolve lock key
        id: resolve
        run: |
          python - <<'PYEOF'
          import base64
          import json
          import os
          import re
          import subprocess

          league_data_b64 = os.environ.get('LEAGUE_DATA_B64', '')
          if league_data_b64:
              try:
                  league_data = json.loads(base64.b64decode(league_data_b64).decode('utf-8'))
              except Exception:
                  league_data = json.loads(league_data_b64)
          else:
              raise SystemExit("ERROR: No league data provided")

          sleeper_league_id = league_data.get('sleeper_league_id') or league_data.get('league_id')
          league_name = league_data.get('league_name', 'Sleeper League')
          if not sleeper_league_id:
              raise SystemExit("ERROR: sleeper_league_id (or league_id) is required")

          pre_computed_db = os.environ.get('PRE_RESOLVED_DATABASE_NAME', '').strip()
          if not pre_computed_db:
              pre_computed_db = league_data.get('database_name', '').strip()
          result = subprocess.run(
              ['python', '.github/scripts/resolve_db_name.py',
               '--league-id', str(sleeper_league_id),
               '--league-name', league_name,
               '--platform', 'sleeper',
               '--database-name', pre_computed_db],
              capture_output=True, text=True
          )
          if result.returncode != 0:
              print(f"WARNING: resolve_db_name.py failed: {result.stderr}")
              db_name = re.sub(r'[^a-zA-Z0-9]+', '_', league_name.strip().lower()).strip('_') or 'sleeper_league'
              if db_name[0].isdigit():
                  db_name = 'l_' + db_name
              db_name = db_name[:63]
          else:
              db_name = result.stdout.strip().split('\n')[-1]

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"database_name={db_name}\n")
          print(f"Resolved database name for lock: {db_name}")
          PYEOF
        env:
          LEAGUE_DATA_B64: ${{ github.event.inputs.league_data_b64 || github.event.client_payload.league_data_b64 }}
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}

  import-sleeper-history:
    needs: resolve-db-lock
    runs-on: ubuntu-latest
    timeout-minutes: 90  # Historical imports may take longer
    concurrency:
      group: central-db-write-${{ needs.resolve-db-lock.outputs.database_name }}
      cancel-in-progress: false

    env:
      PYTHONUNBUFFERED: 1
      IMPORT_PIPELINE_V2: ${{ vars.IMPORT_PIPELINE_V2 }}
      DB_NAME: ${{ github.event.inputs.league_data_b64 && '' || '' }}  # set after parse step
      DATA_DIR: ""  # set after parse step

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache Python virtualenv
        uses: actions/cache@v5
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('requirements.txt') }}


      - name: Create virtualenv
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Activate venv
        run: |
          echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      # ==================== PARSE INPUT ====================
      - name: Parse league data
        id: parse
        run: |
          source .venv/bin/activate
          python - <<'PYEOF'
          import json
          import os
          import base64
          import re

          # Get input from either workflow_dispatch or repository_dispatch
          league_data_b64 = os.environ.get('LEAGUE_DATA_B64', '')
          user_id = os.environ.get('USER_ID', '')
          import_mode = 'full'  # ALWAYS full - this is the full import worker

          # Decode base64 if provided
          if league_data_b64:
              try:
                  league_data = json.loads(base64.b64decode(league_data_b64).decode('utf-8'))
              except:
                  league_data = json.loads(league_data_b64)
          else:
              print("ERROR: No league data provided")
              exit(1)

          # Extract Sleeper-specific fields
          sleeper_league_id = league_data.get('sleeper_league_id') or league_data.get('league_id')
          league_name = league_data.get('league_name', 'Sleeper League')
          username = league_data.get('username', '').strip()
          start_year = int(league_data.get('start_year', 2024))
          end_year = int(league_data.get('end_year') or league_data.get('season', 2025))
          league_ids = league_data.get('league_ids') or {}
          history_years = []
          for year_key in league_ids:
              try:
                  history_years.append(int(year_key))
              except (TypeError, ValueError):
                  continue
          if history_years:
              start_year = min(history_years)
              end_year = max(history_years)
              league_data['start_year'] = start_year
              league_data['end_year'] = end_year
              league_data['season'] = end_year

          # Validate required fields
          if not sleeper_league_id:
              print("ERROR: sleeper_league_id (or league_id) is required")
              exit(1)

          # Resolve database name using shared resolver
          import subprocess
          pre_computed_db = league_data.get('database_name', '').strip()
          result = subprocess.run(
              ['python', '.github/scripts/resolve_db_name.py',
               '--league-id', str(sleeper_league_id),
               '--league-name', league_name,
               '--platform', 'sleeper',
               '--database-name', pre_computed_db],
              capture_output=True, text=True
          )
          if result.returncode != 0:
              print(f"WARNING: resolve_db_name.py failed: {result.stderr}")
              db_name = re.sub(r'[^a-zA-Z0-9]+', '_', league_name.strip().lower()).strip('_') or 'sleeper_league'
              if db_name[0].isdigit():
                  db_name = 'l_' + db_name
              db_name = db_name[:63]
          else:
              db_name = result.stdout.strip().split('\n')[-1]
          print(f"Using database name: {db_name}")

          # Save parsed data for next steps
          with open("league_data_input.json", 'w') as f:
              json.dump(league_data, f, indent=2)

          # Output for GitHub Actions
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"sleeper_league_id={sleeper_league_id}\n")
              f.write(f"league_name={league_name}\n")
              f.write(f"username={username}\n")
              f.write(f"database_name={db_name}\n")
              f.write(f"user_id={user_id}\n")
              f.write(f"import_mode={import_mode}\n")
              f.write(f"start_year={start_year}\n")
              f.write(f"end_year={end_year}\n")

          print(f"Parsed Sleeper league: {league_name}")
          print(f"  League ID: {sleeper_league_id}")
          print(f"  Historical range: {start_year}-{end_year}")
          print(f"  Database: {db_name}")
          print(f"  Import mode: {import_mode}")
          PYEOF
        env:
          LEAGUE_DATA_B64: ${{ github.event.inputs.league_data_b64 || github.event.client_payload.league_data_b64 }}
          USER_ID: ${{ github.event.inputs.user_id || github.event.client_payload.user_id }}
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          PRE_RESOLVED_DATABASE_NAME: ${{ needs.resolve-db-lock.outputs.database_name }}

      # ==================== SET DB_NAME AND DATA_DIR ====================
      - name: Set DB_NAME and DATA_DIR
        run: |
          echo "DB_NAME=${{ steps.parse.outputs.database_name }}" >> $GITHUB_ENV
          echo "DATA_DIR=${{ github.workspace }}/fantasy_football_data/sleeper_${{ steps.parse.outputs.database_name }}" >> $GITHUB_ENV

      # ==================== REGISTER LEAGUE (EARLY) ====================
      # Register league in MotherDuck immediately so it's tracked even if import fails.
      - name: Register league (early)
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          SLEEPER_LEAGUE_ID: ${{ steps.parse.outputs.sleeper_league_id }}
          LEAGUE_NAME: ${{ steps.parse.outputs.league_name }}
          DATABASE_NAME: ${{ steps.parse.outputs.database_name }}
        run: |
          source .venv/bin/activate
          python - <<'PYEOF' || {
          import sys
          sys.path.insert(0, 'fantasy_football_data_scripts')
          import os

          from multi_league.utils.credential_store import register_league

          register_league(
              platform='sleeper',
              league_id=os.environ['SLEEPER_LEAGUE_ID'],
              league_name=os.environ['LEAGUE_NAME'],
              database_name=os.environ['DATABASE_NAME']
          )
          print("League registered (early)")
          PYEOF
            exit_code=$?
            if [ "$exit_code" -eq 139 ]; then
              echo "⚠️ DuckDB segfault on shutdown (exit 139) — league already registered, ignoring"
            else
              exit $exit_code
            fi
          }

      # ==================== CREATE DATA DIRECTORY ====================
      - name: Create data directory
        run: |
          mkdir -p "${{ env.DATA_DIR }}"/{league_settings,rosters,matchups,drafts,transactions}
          echo "Created data directory: ${{ env.DATA_DIR }}"
        id: datadir

      # ==================== CREATE SLEEPER CONTEXT ====================
      - name: Create Sleeper context
        env:
          LEAGUE_NAME: ${{ steps.parse.outputs.league_name }}
        run: |
          source .venv/bin/activate
          python - <<'PYEOF'
          import json
          import os
          from pathlib import Path
          from datetime import datetime
          import math

          with open("league_data_input.json") as f:
              league_data = json.load(f)

          import_mode = 'full'  # ALWAYS full - this is the full import worker
          data_dir = Path("fantasy_football_data/sleeper_${{ steps.parse.outputs.database_name }}").resolve()

          # Extract playoff settings
          playoff_teams = league_data.get('playoff_teams', 6)
          playoff_start_week = league_data.get('playoff_week_start') or league_data.get('playoff_start_week')

          # Calculate bye_teams
          if playoff_teams > 1:
              next_power_of_2 = 2 ** math.ceil(math.log2(playoff_teams))
              bye_teams = next_power_of_2 - playoff_teams
          else:
              bye_teams = 0

          # Detect H2H+Median
          standings_weights = league_data.get('standings_weights')
          uses_median_scoring = league_data.get('uses_median_scoring', False)
          if standings_weights and standings_weights.get('weights', {}).get('above_median_wins', 0) > 0:
              uses_median_scoring = True

          # Create Sleeper context
          context = {
              "league_id": "${{ steps.parse.outputs.sleeper_league_id }}",
              "league_name": os.environ["LEAGUE_NAME"],
              "motherduck_db_name": "${{ steps.parse.outputs.database_name }}",
              "username": "${{ steps.parse.outputs.username }}",
              "sport": "nfl",
              "start_year": int("${{ steps.parse.outputs.start_year }}"),
              "end_year": int("${{ steps.parse.outputs.end_year }}"),
              "num_teams": league_data.get('num_teams'),
              "playoff_teams": playoff_teams,
              "bye_teams": bye_teams,
              "playoff_start_week": playoff_start_week,
              "regular_season_weeks": league_data.get('regular_season_weeks'),
              "uses_median_scoring": uses_median_scoring,
              "data_directory": str(data_dir),
              "max_workers": 3,
              "enable_caching": True,
              "rate_limit_per_min": 1000,
              "roster_to_manager": {},
              "roster_to_guid": {},
              "manager_name_overrides": league_data.get('manager_name_overrides', {}),
              "league_ids": league_data.get('league_ids', {}),
              "created_at": datetime.now().isoformat(),
              "updated_at": datetime.now().isoformat(),
              "platform": "sleeper",
              "import_mode": import_mode,
              "require_oauth": False,
              "keeper_rules": league_data.get('keeper_rules'),
              "league_rules": league_data.get('league_rules'),
              "standings_weights": standings_weights,
          }

          context_path = data_dir / "sleeper_context.json"
          with open(context_path, 'w') as f:
              json.dump(context, f, indent=2)

          with open("sleeper_context.json", 'w') as f:
              json.dump(context, f, indent=2)

          print(f"Sleeper context created: {context['start_year']}-{context['end_year']} (mode: {import_mode})")
          PYEOF

      # ==================== RUN SLEEPER IMPORT ====================
      - name: Run Sleeper import
        id: import
        env:
          AUTO_CONFIRM: "1"
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        working-directory: fantasy_football_data_scripts
        run: |
          source ../.venv/bin/activate
          echo "========================================"
          echo "Starting Sleeper FULL import for ${{ steps.parse.outputs.league_name }}"
          echo "League ID: ${{ steps.parse.outputs.sleeper_league_id }}"
          echo "Historical Years: ${{ steps.parse.outputs.start_year }}-${{ steps.parse.outputs.end_year }}"
          echo "========================================"

          set +e
          python sleeper_initial_import.py \
            --context ../sleeper_context.json \
            --import-mode full \
            --skip-track-2-upload \
            2>&1 | tee ../import.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -ne 0 ]; then
            echo "SLEEPER FULL IMPORT FAILED (exit code ${EXIT_CODE})"
            tail -200 ../import.log
            exit $EXIT_CODE
          fi

          echo "Sleeper full import completed successfully"

      # ==================== CALCULATE EXPECTED RECORDS ====================
      - name: Calculate expected records
        if: steps.import.outputs.exit_code == '0'
        continue-on-error: true
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          cd fantasy_football_data_scripts
          python -m multi_league.transformations.matchup.expected_record_v2 \
            --db ${{ env.DB_NAME }} \
            --data-dir ${{ env.DATA_DIR }} \
            --n-sims 10000

      # ==================== CALCULATE PLAYOFF ODDS ====================
      - name: Calculate playoff odds
        if: steps.import.outputs.exit_code == '0'
        continue-on-error: true
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          cd fantasy_football_data_scripts
          python -m multi_league.transformations.matchup.playoff_odds_import \
            --db ${{ env.DB_NAME }} \
            --data-dir ${{ env.DATA_DIR }} \
            --n-sims 10000

      # Clutch equity now runs in-process inside playoff_odds_import (no separate step needed)

      # ==================== RUN AGGREGATIONS ====================
      - name: Run aggregations
        if: steps.import.outputs.exit_code == '0'
        continue-on-error: true
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          cd fantasy_football_data_scripts
          python -m multi_league.transformations.aggregation.aggregate_matchup_context \
            --db ${{ env.DB_NAME }} --data-dir ${{ env.DATA_DIR }}
          python -m multi_league.transformations.aggregation.aggregate_fantasy_context \
            --db ${{ env.DB_NAME }} --data-dir ${{ env.DATA_DIR }}
          python -m multi_league.transformations.aggregation.aggregate_draft_context \
            --db ${{ env.DB_NAME }} --data-dir ${{ env.DATA_DIR }}
          python -m multi_league.transformations.aggregation.aggregate_transaction_context \
            --db ${{ env.DB_NAME }} --data-dir ${{ env.DATA_DIR }}
          python -m multi_league.transformations.aggregation.aggregate_standings \
            --db ${{ env.DB_NAME }} --data-dir ${{ env.DATA_DIR }}
          python -m multi_league.transformations.aggregation.homepage_summary \
            --db ${{ env.DB_NAME }} --data-dir ${{ env.DATA_DIR }}

      # ==================== UPLOAD TO MOTHERDUCK ====================
      - name: Upload to MotherDuck
        if: steps.import.outputs.exit_code == '0'
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          cd fantasy_football_data_scripts
          python -c "
          from multi_league.core.local_db import LocalLeagueDB
          db = LocalLeagueDB('${{ env.DATA_DIR }}', '${{ env.DB_NAME }}')
          db.connect()
          db.upload_to_motherduck('${{ env.DB_NAME }}')
          db.close()
          print('Upload to MotherDuck complete')
          "

      # ==================== STORE SLEEPER LEAGUE INFO ====================
      - name: Gracefully shut down Duckling
        if: always()
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          if [ -z "$MOTHERDUCK_TOKEN" ]; then
            echo "MOTHERDUCK_TOKEN not set - skipping shutdown"
            exit 0
          fi

          cd fantasy_football_data_scripts
          python -m multi_league.core.duckling_manager || {
            echo "Duckling shutdown failed (non-critical)"
            exit 0
          }

      # ==================== SUMMARY ====================
      - name: Print summary
        if: always()
        run: |
          echo "========================================"
          echo "SLEEPER FULL IMPORT SUMMARY"
          echo "========================================"
          echo "League: ${{ steps.parse.outputs.league_name }}"
          echo "Historical Years: ${{ steps.parse.outputs.start_year }}-${{ steps.parse.outputs.end_year }}"
          echo "Import exit code: ${{ steps.import.outputs.exit_code }}"
          echo "Import status: ${{ steps.import.outputs.exit_code == '0' && 'SUCCESS' || 'FAILED' }}"
          echo "========================================"
