name: ESPN Fleet Import

# Imports multiple ESPN leagues in parallel using matrix strategy.
# Each league runs as its own independent job so failures are isolated.
#
# Usage:
#   source=full/quick/motherduck: auto-discover from ___ops via Fly.io
#   source=custom: provide leagues_json
#   source=test: run tfl_of_extraordinary_gentleman only

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'League source: "full" (paid/grandfathered), "quick" (free only), "motherduck" (all), "test", or "custom"'
        required: true
        type: choice
        options:
          - full
          - quick
          - motherduck
          - test
          - custom
        default: full
      leagues_json:
        description: 'JSON array of leagues (only used when source=custom). Format: [{"espn_league_id":"...", "database_name":"...", "start_year":2012, "end_year":2025}]'
        required: false
        type: string
      max_parallel:
        description: 'Max parallel imports'
        required: false
        type: number
        default: 5
      dry_run:
        description: 'Dry run - discover leagues but skip import'
        required: false
        type: boolean
        default: false
      yahoo_oauth_ref:
        description: 'yahoo_oauth branch/ref to check out (default main)'
        required: false
        type: string
        default: 'main'

permissions:
  actions: write
  contents: read

jobs:
  # ================================================================
  # Job 1: Discover leagues and build the matrix
  # ================================================================
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      league_count: ${{ steps.build.outputs.league_count }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          repository: jeleff1000/yahoo_oauth
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build league matrix
        id: build
        env:
          DATABASE_SERVER_URL: ${{ secrets.DATABASE_SERVER_URL }}
          DATABASE_READ_TOKEN: ${{ secrets.DATABASE_READ_TOKEN }}
          SOURCE: ${{ github.event.inputs.source }}
          LEAGUES_JSON: ${{ github.event.inputs.leagues_json }}
        run: |
          python - <<'PYEOF'
          import json, os, sys, urllib.request

          def fly_query(sql, database="___ops"):
              url = os.environ["DATABASE_SERVER_URL"].rstrip("/") + "/query"
              token = os.environ["DATABASE_READ_TOKEN"]
              data = json.dumps({"sql": sql, "database": database}).encode()
              req = urllib.request.Request(url, data=data, headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {token}",
              })
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.loads(resp.read())

          source = os.environ.get("SOURCE", "test")
          leagues_json_raw = os.environ.get("LEAGUES_JSON", "")

          if source == "custom" and leagues_json_raw:
              leagues = json.loads(leagues_json_raw)

          elif source == "test":
              leagues = [
                  {"espn_league_id": "71580", "database_name": "tfl_of_extraordinary_gentleman", "import_mode": "full"},
              ]

          elif source in ("motherduck", "full", "quick"):
              raw_rows = fly_query("""
                  SELECT league_id, database_name, entitled_mode
                  FROM accounts.league_inventory
                  WHERE platform = 'espn'
                    AND league_id IS NOT NULL
                  ORDER BY database_name
              """)

              all_leagues = [
                  {"espn_league_id": str(r["league_id"]), "database_name": r["database_name"], "import_mode": r["entitled_mode"] or "quick"}
                  for r in raw_rows
              ]

              # Filter by source type
              if source == "full":
                  all_leagues = [v for v in all_leagues if v["import_mode"] == "full"]
                  print(f"Full-only fleet: {len(all_leagues)} paid/grandfathered leagues")
              elif source == "quick":
                  all_leagues = [v for v in all_leagues if v["import_mode"] == "quick"]
                  print(f"Quick-only fleet: {len(all_leagues)} free leagues")
              else:
                  print(f"All leagues: {len(all_leagues)} ({sum(1 for v in all_leagues if v['import_mode'] == 'full')} full, {sum(1 for v in all_leagues if v['import_mode'] != 'full')} quick)")

              leagues = all_leagues
          else:
              print(f"ERROR: Unknown source '{source}'")
              sys.exit(1)

          # Validate
          for lg in leagues:
              assert lg.get("espn_league_id"), f"Missing espn_league_id: {lg}"
              assert lg.get("database_name"), f"Missing database_name: {lg}"
              if "import_mode" not in lg:
                  lg["import_mode"] = "full"

          matrix = {"include": leagues}

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
              f.write(f"league_count={len(leagues)}\n")

          print(f"Discovered {len(leagues)} ESPN leagues:")
          for lg in leagues:
              print(f"  {lg['database_name']} (ID={lg['espn_league_id']}, mode={lg['import_mode']})")
          PYEOF

  # ================================================================
  # Job 1.1: Scale up Fly server for fleet import
  # ================================================================
  scale-up:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Scale Fly to 8GB RAM
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          curl -sL https://fly.io/install.sh | sh
          export PATH="$HOME/.fly/bin:$PATH"
          flyctl scale memory 8192 -a league-history-duckdb
          echo "Scaled to 8GB for fleet import"

  # ================================================================
  # Job 1.5: Build or restore ___ops cache
  # ================================================================
  build-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          repository: jeleff1000/yahoo_oauth
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Restore ops cache
        id: cache
        uses: actions/cache@v5
        with:
          path: ops_cache
          key: ops-cache-v1-${{ hashFiles('fantasy_football_data_scripts/build_ops_cache.py') }}
          restore-keys: ops-cache-v1-

      - name: Build ops cache (on miss)
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          DATABASE_SERVER_URL: ${{ secrets.DATABASE_SERVER_URL }}
          DATABASE_READ_TOKEN: ${{ secrets.DATABASE_READ_TOKEN }}
        run: |
          pip install duckdb==1.5.1 pandas
          python fantasy_football_data_scripts/build_ops_cache.py \
            --output ops_cache/ops_cache.duckdb

  # ================================================================
  # Job 2: Import each league in parallel (matrix)
  # ================================================================
  import-league:
    needs: [discover, build-cache, scale-up]
    if: ${{ !inputs.dry_run && fromJson(needs.discover.outputs.league_count) > 0 }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
      max-parallel: ${{ fromJson(github.event.inputs.max_parallel || '5') }}
      fail-fast: false

    env:
      PYTHONUNBUFFERED: 1
      DB_NAME: ${{ matrix.database_name }}
      ESPN_LEAGUE_ID: ${{ matrix.espn_league_id }}
      IMPORT_MODE: ${{ matrix.import_mode }}
      CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
      OPS_CACHE_PATH: ${{ github.workspace }}/ops_cache/ops_cache.duckdb
      DATABASE_BACKEND: fly
      DATABASE_SERVER_URL: ${{ secrets.DATABASE_SERVER_URL }}
      DATABASE_READ_TOKEN: ${{ secrets.DATABASE_READ_TOKEN }}
      DATABASE_ADMIN_TOKEN: ${{ secrets.DATABASE_ADMIN_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          repository: jeleff1000/yahoo_oauth
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.inputs.yahoo_oauth_ref || 'main' }}

      - name: Restore ops cache
        uses: actions/cache@v5
        with:
          path: ops_cache
          key: ops-cache-v1-${{ hashFiles('fantasy_football_data_scripts/build_ops_cache.py') }}
          restore-keys: ops-cache-v1-

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache Python virtualenv
        uses: actions/cache@v5
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('requirements.txt') }}

      - name: Create virtualenv
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Activate venv
        run: echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      - name: Apply ops_cache fixups
        run: |
          source .venv/bin/activate
          python -c "
          import duckdb
          conn = duckdb.connect('${{ github.workspace }}/ops_cache/ops_cache.duckdb')
          with open('fantasy_football_data_scripts/ops_cache_fixups.sql') as f:
              conn.execute(f.read())
          conn.close()
          print('[ops-cache] Applied data fixups')
          "

      # ==================== RETRIEVE COOKIES ====================
      - name: Retrieve ESPN cookies
        id: cookies
        run: |
          python - <<'PYEOF'
          import json, os, sys, urllib.request

          def fly_query(sql, database="___ops"):
              url = os.environ["DATABASE_SERVER_URL"].rstrip("/") + "/query"
              token = os.environ["DATABASE_READ_TOKEN"]
              data = json.dumps({"sql": sql, "database": database}).encode()
              req = urllib.request.Request(url, data=data, headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {token}",
              })
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.loads(resp.read())

          db_name = os.environ['DB_NAME']
          enc_key = os.environ.get('CREDENTIAL_ENCRYPTION_KEY', '')

          if not enc_key:
              print("No CREDENTIAL_ENCRYPTION_KEY — league may be public")
              with open(".espn_s2", "w") as f: f.write("")
              with open(".espn_swid", "w") as f: f.write("")
              sys.exit(0)

          rows = fly_query(f"""
              SELECT encrypted_espn_s2, encrypted_swid
              FROM main.espn_leagues
              WHERE database_name = '{db_name}'
          """)

          if not rows or not rows[0].get("encrypted_espn_s2"):
              print(f"No stored cookies for {db_name} — public league")
              with open(".espn_s2", "w") as f: f.write("")
              with open(".espn_swid", "w") as f: f.write("")
              sys.exit(0)

          from cryptography.fernet import Fernet
          f = Fernet(enc_key.encode())
          espn_s2 = f.decrypt(rows[0]["encrypted_espn_s2"].encode()).decode()
          swid = f.decrypt(rows[0]["encrypted_swid"].encode()).decode()

          with open(".espn_s2", "w") as fh: fh.write(espn_s2)
          with open(".espn_swid", "w") as fh: fh.write(swid)
          print(f"Decrypted ESPN cookies for {db_name}")
          PYEOF

      # ==================== CREATE CONTEXT ====================
      - name: Create ESPN context
        run: |
          python - <<'PYEOF'
          import json, os
          from pathlib import Path
          from datetime import datetime

          db_name = os.environ['DB_NAME']
          espn_league_id = int(os.environ['ESPN_LEAGUE_ID'])
          league_name = "${{ matrix.league_name || matrix.database_name }}"
          data_dir = Path(os.environ.get('GITHUB_WORKSPACE', '.')) / "fantasy_football_data" / f"espn_{db_name}"
          data_dir.mkdir(parents=True, exist_ok=True)

          espn_s2 = ""
          swid = ""
          try:
              with open(".espn_s2") as f: espn_s2 = f.read().strip()
              with open(".espn_swid") as f: swid = f.read().strip()
          except FileNotFoundError:
              pass

          # NFL season year = the calendar year a season starts in.
          # Through August: previous season is current; September+: this calendar year.
          today = datetime.now()
          current_nfl_year = today.year if today.month >= 9 else today.year - 1

          # Per-league overrides come in via the matrix; fall back to ESPN-fantasy-era defaults.
          start_year = int("${{ matrix.start_year || 2004 }}")
          end_year = int("${{ matrix.end_year || 0 }}") or current_nfl_year

          context = {
              "league_id": espn_league_id,
              "league_name": league_name,
              "motherduck_db_name": db_name,
              "espn_s2": espn_s2,
              "swid": swid,
              "sport": "nfl",
              "start_year": start_year,
              "end_year": end_year,
              "data_directory": str(data_dir),
              "max_workers": 3,
              "enable_caching": True,
              "team_to_manager": {},
              "team_to_guid": {},
              "team_to_team_name": {},
              "manager_name_overrides": {},
              "external_column_maps": [],
              "external_identity_maps": {},
              "created_at": datetime.now().isoformat(),
              "platform": "espn",
              "import_mode": os.environ.get("IMPORT_MODE", "full"),
              "require_oauth": False,
              "league_ids": {},
          }

          with open("espn_context.json", "w") as f:
              json.dump(context, f, indent=2)

          # Also write data_dir for later steps
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"data_dir={data_dir}\n")

          print(f"ESPN context: {league_name} (ID={espn_league_id}, db={db_name})")
          PYEOF
        id: context

      # ==================== IMPORT ====================
      - name: Run import
        id: import
        working-directory: fantasy_football_data_scripts
        run: |
          source ../.venv/bin/activate
          echo "========================================"
          echo "Importing: ${{ env.DB_NAME }}"
          echo "League ID: ${{ env.ESPN_LEAGUE_ID }}"
          echo "Import mode: ${{ env.IMPORT_MODE }}"
          echo "========================================"

          set +e
          python espn_initial_import.py \
            --context ../espn_context.json \
            --import-mode ${{ env.IMPORT_MODE }} \
            --skip-track-2-upload \
            2>&1 | tee ../import_${{ env.DB_NAME }}.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT
          echo "data_dir=${{ steps.context.outputs.data_dir }}" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -ne 0 ]; then
            echo "IMPORT FAILED for ${{ env.DB_NAME }} (exit code ${EXIT_CODE})"
            tail -100 ../import_${{ env.DB_NAME }}.log
            exit $EXIT_CODE
          fi

      # ==================== SIMS ====================
      - name: Calculate expected records
        if: steps.import.outputs.exit_code == '0'
        run: |
          cd fantasy_football_data_scripts
          python -m multi_league.transformations.matchup.expected_record_v2 \
            --db ${{ env.DB_NAME }} \
            --data-dir ${{ steps.import.outputs.data_dir }} \
            --n-sims 10000

      - name: Calculate playoff odds
        if: steps.import.outputs.exit_code == '0'
        run: |
          cd fantasy_football_data_scripts
          python -m multi_league.transformations.matchup.playoff_odds_import \
            --db ${{ env.DB_NAME }} \
            --data-dir ${{ steps.import.outputs.data_dir }} \
            --n-sims 10000

      # ==================== AGGREGATIONS ====================
      - name: Run aggregations
        if: steps.import.outputs.exit_code == '0'
        run: |
          cd fantasy_football_data_scripts
          python ../scripts/refresh_aggregates.py \
            --db ${{ env.DB_NAME }} \
            --data-dir ${{ steps.import.outputs.data_dir }}

      # ==================== UPLOAD ====================
      - name: Upload to database
        if: steps.import.outputs.exit_code == '0'
        run: |
          cd fantasy_football_data_scripts
          python -c "
          from multi_league.core.local_db import LocalLeagueDB
          db = LocalLeagueDB('${{ steps.import.outputs.data_dir }}', '${{ env.DB_NAME }}')
          db.connect()
          db.upload_to_fly('${{ env.DB_NAME }}')
          print('Upload to Fly complete: ${{ env.DB_NAME }}')
          db.close()
          "

      # ==================== CLEANUP ====================
      - name: Cleanup sensitive files
        if: always()
        run: rm -f .espn_s2 .espn_swid

      # ==================== STATUS ====================
      - name: Print status
        if: always()
        run: |
          echo "========================================"
          echo "RESULT: ${{ env.DB_NAME }}"
          echo "Import: ${{ steps.import.outputs.exit_code == '0' && 'SUCCESS' || 'FAILED' }}"
          echo "========================================"

  # ================================================================
  # Job 3: Summary
  # ================================================================
  summary:
    needs: [discover, import-league]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fleet summary
        run: |
          echo "========================================"
          echo "ESPN FLEET IMPORT COMPLETE"
          echo "========================================"
          echo "Leagues attempted: ${{ needs.discover.outputs.league_count }}"
          echo "Source: ${{ github.event.inputs.source }}"
          echo "Max parallel: ${{ github.event.inputs.max_parallel || 5 }}"
          echo "========================================"

  # ================================================================
  # Job 4: Scale down Fly server after fleet import
  # ================================================================
  scale-down:
    needs: [import-league]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Scale Fly back to 4GB RAM
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          curl -sL https://fly.io/install.sh | sh
          export PATH="$HOME/.fly/bin:$PATH"
          flyctl scale memory 4096 -a league-history-duckdb
          echo "Scaled back to 4GB after fleet import"
