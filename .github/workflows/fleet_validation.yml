name: Fleet Validation

# Page-oriented, fleet-wide validator for ___leagues.
# ~299 checks, ~20-35 queries via GROUP BY db_name batching.
# Runs from league-history-workers (unlimited Actions minutes).

on:
  workflow_dispatch:
    inputs:
      db:
        description: 'Specific league(s) to validate (comma-separated, empty = all)'
        required: false
        type: string
      changed_only:
        description: 'Only validate leagues imported since last run'
        required: false
        type: boolean
        default: false
      store:
        description: 'Store results in ___ops.fleet_health'
        required: false
        type: boolean
        default: true
      debug_sample:
        description: 'Number of example rows per failed check (0 = disabled)'
        required: false
        type: number
        default: 0
      yahoo_oauth_ref:
        description: 'Branch/ref to checkout from yahoo_oauth (default: main)'
        required: false
        type: string
        default: main
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC

permissions:
  contents: read

jobs:
  scale-up:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Scale Fly to 8GB RAM
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          curl -sL https://fly.io/install.sh | sh
          export PATH="$HOME/.fly/bin:$PATH"
          flyctl scale memory 8192 -a league-history-duckdb
          echo "Scaled to 8GB for validation"

      - name: Wait for DuckDB API readiness
        run: |
          deadline=$((SECONDS + 300))
          until curl -fsS https://league-history-duckdb.fly.dev/ready | grep -q '"ready":true'; do
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "DuckDB API did not become ready within 5 minutes"
              exit 1
            fi
            echo "Waiting for DuckDB API to finish restarting..."
            sleep 10
          done
          echo "DuckDB API is ready"

  validate-fleet:
    needs: [scale-up]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          repository: jeleff1000/yahoo_oauth
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ inputs.yahoo_oauth_ref || 'main' }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install duckdb==1.5.1 pandas

      - name: Run fleet validation
        env:
          DATABASE_SERVER_URL: ${{ secrets.DATABASE_SERVER_URL }}
          DATABASE_READ_TOKEN: ${{ secrets.DATABASE_READ_TOKEN }}
          DATABASE_ADMIN_TOKEN: ${{ secrets.DATABASE_ADMIN_TOKEN }}
          FLY_PRIMARY_MACHINE_ID: ${{ secrets.FLY_PRIMARY_MACHINE_ID }}
          FLY_REPLICA_MACHINE_IDS: ${{ secrets.FLY_REPLICA_MACHINE_IDS }}
          DATABASE_BACKEND: fly
          PYTHONUNBUFFERED: '1'
        run: |
          cd fantasy_football_data_scripts

          CMD="python -m multi_league.validation_v2"
          CMD="$CMD --verbose"

          # --store flag
          if [ "${{ inputs.store }}" = "true" ] || [ -z "${{ inputs.store }}" ]; then
            CMD="$CMD --store"
          fi

          # --changed-only flag
          if [ "${{ inputs.changed_only }}" = "true" ]; then
            CMD="$CMD --changed-only"
          fi

          # --db flag (comma-separated -> multiple --db args)
          if [ -n "${{ inputs.db }}" ]; then
            IFS=',' read -ra DBS <<< "${{ inputs.db }}"
            for db in "${DBS[@]}"; do
              CMD="$CMD --db $(echo $db | xargs)"
            done
          fi

          # --debug-sample flag
          if [ -n "${{ inputs.debug_sample }}" ] && [ "${{ inputs.debug_sample }}" != "0" ]; then
            CMD="$CMD --debug-sample ${{ inputs.debug_sample }}"
          fi

          echo "Running: $CMD"
          $CMD

      - name: Query results summary
        if: always()
        env:
          DATABASE_SERVER_URL: ${{ secrets.DATABASE_SERVER_URL }}
          DATABASE_READ_TOKEN: ${{ secrets.DATABASE_READ_TOKEN }}
        run: |
          python - <<'PYEOF'
          import json, os, urllib.request

          def fly_query(sql, database="___ops"):
              url = os.environ["DATABASE_SERVER_URL"].rstrip("/") + "/query"
              token = os.environ["DATABASE_READ_TOKEN"]
              data = json.dumps({"sql": sql, "database": database}).encode()
              req = urllib.request.Request(url, data=data, headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {token}",
              })
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.loads(resp.read())

          print("\n=== FLEET HEALTH SUMMARY ===\n")

          try:
              rows = fly_query("""
                  SELECT run_id, run_timestamp,
                         COUNT(DISTINCT db_name) as leagues,
                         SUM(CASE WHEN NOT passed AND NOT suppressed THEN 1 ELSE 0 END) as visible_failures,
                         SUM(CASE WHEN NOT passed AND suppressed THEN 1 ELSE 0 END) as suppressed_failures,
                         SUM(CASE WHEN passed AND NOT skipped THEN 1 ELSE 0 END) as passed
                  FROM fleet_health.validation_results
                  GROUP BY run_id, run_timestamp
                  ORDER BY run_timestamp DESC LIMIT 1
              """)

              if rows:
                  run = rows[0]
                  print(f"Run: {run['run_id']} at {run['run_timestamp']}")
                  print(f"Leagues: {run['leagues']}")
                  print(f"Passed: {run['passed']}, Failed: {run['visible_failures']}, Suppressed: {run['suppressed_failures']}")

              print("\n--- By Severity ---")
              rows = fly_query("""
                  SELECT severity,
                         COUNT(*) FILTER (WHERE NOT passed AND NOT suppressed) as failures,
                         COUNT(DISTINCT db_name) FILTER (WHERE NOT passed AND NOT suppressed) as leagues
                  FROM fleet_health.validation_results
                  WHERE run_id = (
                      SELECT run_id FROM fleet_health.validation_results
                      ORDER BY run_timestamp DESC LIMIT 1
                  )
                  GROUP BY severity
                  ORDER BY CASE severity
                      WHEN 'BLOCKER' THEN 1 WHEN 'ERROR' THEN 2
                      WHEN 'WARNING' THEN 3 WHEN 'INFO' THEN 4 END
              """)
              for row in rows:
                  if row['failures'] > 0:
                      print(f"  {row['severity']}: {row['failures']} failures across {row['leagues']} leagues")

              print("\n--- Top 15 Failing Checks ---")
              rows = fly_query("""
                  SELECT check_name, severity,
                         COUNT(DISTINCT db_name) as leagues,
                         SUM(fail_count) as total_rows
                  FROM fleet_health.validation_results
                  WHERE NOT passed AND NOT suppressed
                    AND run_id = (
                        SELECT run_id FROM fleet_health.validation_results
                        ORDER BY run_timestamp DESC LIMIT 1
                    )
                  GROUP BY check_name, severity
                  ORDER BY
                      CASE severity WHEN 'BLOCKER' THEN 1 WHEN 'ERROR' THEN 2 ELSE 3 END,
                      leagues DESC
                  LIMIT 15
              """)
              for row in rows:
                  print(f"  [{row['severity']}] {row['leagues']:>4} leagues  {row['check_name']}")

          except Exception as e:
              print(f"Could not query results: {e}")
          PYEOF

  scale-down:
    needs: [validate-fleet]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Scale Fly back to 4GB RAM
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          curl -sL https://fly.io/install.sh | sh
          export PATH="$HOME/.fly/bin:$PATH"
          flyctl scale memory 4096 -a league-history-duckdb
          echo "Scaled back to 4GB after validation"
