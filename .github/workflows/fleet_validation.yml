name: Fleet Validation

# Page-oriented, fleet-wide validator for ___leagues.
# ~299 checks, ~20-35 queries via GROUP BY db_name batching.
# Runs from league-history-workers (unlimited Actions minutes).

on:
  workflow_dispatch:
    inputs:
      db:
        description: 'Specific league(s) to validate (comma-separated, empty = all)'
        required: false
        type: string
      changed_only:
        description: 'Only validate leagues imported since last run'
        required: false
        type: boolean
        default: false
      store:
        description: 'Store results in ___ops.fleet_health'
        required: false
        type: boolean
        default: true
      debug_sample:
        description: 'Number of example rows per failed check (0 = disabled)'
        required: false
        type: number
        default: 0
      yahoo_oauth_ref:
        description: 'Branch/ref to checkout from yahoo_oauth (default: main)'
        required: false
        type: string
        default: main
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC

permissions:
  contents: read

jobs:
  validate-fleet:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          repository: jeleff1000/yahoo_oauth
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ inputs.yahoo_oauth_ref || 'main' }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install duckdb==1.5.1

      - name: Run fleet validation
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          PYTHONUNBUFFERED: '1'
        run: |
          cd fantasy_football_data_scripts

          CMD="python -m multi_league.validation_v2"
          CMD="$CMD --verbose"

          # --store flag
          if [ "${{ inputs.store }}" = "true" ] || [ -z "${{ inputs.store }}" ]; then
            CMD="$CMD --store"
          fi

          # --changed-only flag
          if [ "${{ inputs.changed_only }}" = "true" ]; then
            CMD="$CMD --changed-only"
          fi

          # --db flag (comma-separated -> multiple --db args)
          if [ -n "${{ inputs.db }}" ]; then
            IFS=',' read -ra DBS <<< "${{ inputs.db }}"
            for db in "${DBS[@]}"; do
              CMD="$CMD --db $(echo $db | xargs)"
            done
          fi

          # --debug-sample flag
          if [ -n "${{ inputs.debug_sample }}" ] && [ "${{ inputs.debug_sample }}" != "0" ]; then
            CMD="$CMD --debug-sample ${{ inputs.debug_sample }}"
          fi

          echo "Running: $CMD"
          $CMD

      - name: Query results summary
        if: always()
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          python - <<'PYEOF'
          import duckdb, os

          token = os.environ['MOTHERDUCK_TOKEN']
          conn = duckdb.connect(f"md:___ops?motherduck_token={token}")

          print("\n=== FLEET HEALTH SUMMARY ===\n")

          try:
              run = conn.execute("""
                  SELECT run_id, run_timestamp,
                         COUNT(DISTINCT db_name) as leagues,
                         SUM(CASE WHEN NOT passed AND NOT suppressed THEN 1 ELSE 0 END) as visible_failures,
                         SUM(CASE WHEN NOT passed AND suppressed THEN 1 ELSE 0 END) as suppressed_failures,
                         SUM(CASE WHEN passed AND NOT skipped THEN 1 ELSE 0 END) as passed
                  FROM fleet_health.validation_results
                  GROUP BY run_id, run_timestamp
                  ORDER BY run_timestamp DESC LIMIT 1
              """).fetchone()

              if run:
                  print(f"Run: {run[0]} at {run[1]}")
                  print(f"Leagues: {run[2]}")
                  print(f"Passed: {run[5]}, Failed: {run[3]}, Suppressed: {run[4]}")

              print("\n--- By Severity ---")
              rows = conn.execute("""
                  SELECT severity,
                         COUNT(*) FILTER (WHERE NOT passed AND NOT suppressed) as failures,
                         COUNT(DISTINCT db_name) FILTER (WHERE NOT passed AND NOT suppressed) as leagues
                  FROM fleet_health.validation_results
                  WHERE run_id = (SELECT MAX(run_id) FROM fleet_health.validation_results)
                  GROUP BY severity
                  ORDER BY CASE severity
                      WHEN 'BLOCKER' THEN 1 WHEN 'ERROR' THEN 2
                      WHEN 'WARNING' THEN 3 WHEN 'INFO' THEN 4 END
              """).fetchall()
              for sev, failures, leagues in rows:
                  if failures > 0:
                      print(f"  {sev}: {failures} failures across {leagues} leagues")

              print("\n--- Top 15 Failing Checks ---")
              rows = conn.execute("""
                  SELECT check_name, severity,
                         COUNT(DISTINCT db_name) as leagues,
                         SUM(fail_count) as total_rows
                  FROM fleet_health.validation_results
                  WHERE NOT passed AND NOT suppressed
                    AND run_id = (SELECT MAX(run_id) FROM fleet_health.validation_results)
                  GROUP BY check_name, severity
                  ORDER BY
                      CASE severity WHEN 'BLOCKER' THEN 1 WHEN 'ERROR' THEN 2 ELSE 3 END,
                      leagues DESC
                  LIMIT 15
              """).fetchall()
              for check, sev, leagues, total in rows:
                  print(f"  [{sev}] {leagues:>4} leagues  {check}")

          except Exception as e:
              print(f"Could not query results: {e}")

          conn.close()
          PYEOF
